<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>회원관리 studioMUSE</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#4338ca">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="회원관리">
<style>
:root{
  --bg:#f6f7fb; --card:#ffffff; --ink:#1f2937; --sub:#4b5563; --line:#eceef4;
  --brand:#6366f1; --brand-soft:#eef2ff; --ok:#10b981; --ok-soft:#ecfdf5;
  --warn:#f59e0b; --warn-soft:#fffbeb; --bad:#ef4444; --bad-soft:#fef2f2;
  --radius:18px; --grad:linear-gradient(135deg,#6366f1,#8b5cf6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);font-size:16px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px;padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;width:100%;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brand);outline-offset:-1px;border-color:var(--brand)}
label{font-size:13px;color:var(--sub);display:block;margin-bottom:4px;font-weight:600}

/* layout */
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:linear-gradient(180deg,#312e81 0%,#1e1b4b 100%);color:#cbd5e1;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.sidebar .logo{padding:20px 18px;font-weight:800;color:#fff;font-size:16px;border-bottom:1px solid rgba(255,255,255,.1);line-height:1.4}
.sidebar .logo small{display:block;font-weight:400;color:#64748b;font-size:11px;margin-top:2px}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:#c7d2fe;padding:13px 12px;border-radius:8px;font-size:24px;font-weight:600;margin-bottom:2px}
.nav button:hover{background:rgba(255,255,255,.09);color:#fff}
.nav button.active{background:var(--grad);color:#fff;font-weight:700;box-shadow:0 4px 12px rgba(99,102,241,.35)}
.nav .ico{width:30px;text-align:center;font-size:24px}
.sidebar .foot{padding:12px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:#a5b4fc}
.main{flex:1;min-width:0;padding:22px;padding-bottom:90px}
.pagehead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.pagehead h1{font-size:18px}
.pagehead .sub{color:var(--sub);font-size:13px;margin-top:3px}

/* mobile nav */
.mobiletop{display:none}
.tabbar{display:none}
@media(max-width:860px){
  .sidebar{display:none}
  .main{padding:10px;padding-bottom:128px}
  .mobiletop{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#4338ca,#6d28d9);color:#fff;padding:10px 12px;font-weight:800;position:sticky;top:0;z-index:40;flex-wrap:wrap;gap:6px}
  #brandMobile{font-size:20px}
  .mobiletop small{font-weight:400;color:#c7d2fe;font-size:12px}
  .mobiletop .btn.topnav{background:rgba(255,255,255,.16);border:none;color:#fff;font-size:16px;font-weight:700;padding:8px 12px;border-radius:14px;backdrop-filter:blur(4px)}
  .tabbar{display:flex;position:fixed;bottom:10px;left:10px;right:10px;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border:none;border-radius:26px;box-shadow:0 8px 30px rgba(49,46,129,.22);z-index:40;padding:7px 5px calc(7px + env(safe-area-inset-bottom))}
  .tabbar button{flex:1;background:none;border:none;padding:7px 1px 8px;font-size:15px;font-weight:800;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:3px;white-space:nowrap;border-radius:18px;margin:0 2px}
  .tabbar button .ico{font-size:26px}
  .tabbar button.active{color:var(--brand);background:var(--brand-soft)}
  /* 큰 글씨 + 한 화면 배치 */
  body{font-size:16px}
  .card{padding:12px;margin-bottom:9px}
  .card h2{font-size:18px;font-weight:800;margin-bottom:8px}
  .btn{font-size:15px;padding:9px 12px;min-height:48px}
  .btn.primary{font-size:17px;font-weight:800}
  .btn.sm{font-size:14px;padding:8px 11px;min-height:40px}
  input,select,textarea{font-size:15px}
  label{font-size:15px}
  .regform label{font-size:16px}
  .regform input,.regform select{font-size:16px}
  table{font-size:15px}
  th{font-size:14px}
  td{white-space:nowrap}
  td{padding:10px 9px}
  .muted{font-size:16px}
  .badge{font-size:13px;padding:4px 10px}
  .detailgrid .item .k{font-size:14px}
  .detailgrid .item .v{font-size:20px;font-weight:800}
  .copybox{font-size:16px}
  .lessonday .dh{font-size:16px;padding:9px 12px}
  .lessonday .li{font-size:16px;padding:10px 12px}
  .pagehead{margin-bottom:8px}
  .pagehead h1{font-size:18px}
  .pagehead .sub{font-size:15px;font-weight:700}
  .grid{gap:8px}
  .empty{font-size:16px;padding:14px 8px}
  .card .row{font-size:15px}
}

/* components */
.card{background:var(--card);border:none;border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(17,24,39,.05),0 6px 20px rgba(17,24,39,.05)}
.card h2{font-size:18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.grid{display:grid;gap:12px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:860px){.g4,.g3{grid-template-columns:repeat(2,1fr)}}
/* 폰에서도 입력폼 2열 유지 */
.stat{background:var(--card);border:none;border-radius:var(--radius);padding:14px 16px;cursor:pointer;box-shadow:0 1px 2px rgba(17,24,39,.05),0 6px 20px rgba(17,24,39,.05)}
.stat .n{font-size:26px;font-weight:800;margin-top:4px}
.stat .t{font-size:12.5px;color:var(--sub);font-weight:600}
.stat.bad .n{color:var(--bad)} .stat.ok .n{color:var(--ok)} .stat.brand .n{color:var(--brand)} .stat.warn .n{color:var(--warn)}

.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:12px;font-size:14.5px;font-weight:700;transition:.15s;min-height:48px}
.btn:hover{background:#f8fafc}
.btn.primary{background:var(--grad);border:none;color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.btn.primary:hover{filter:brightness(1.06)}
.btn.danger{color:var(--bad);border-color:#fecaca}
.btn.sm{padding:6px 12px;font-size:13.5px;min-height:44px}
.btn.ghost{border:none;background:none;color:var(--brand)}

.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:700;white-space:nowrap}
.b-ok{background:var(--ok-soft);color:var(--ok)}
.b-warn{background:var(--warn-soft);color:var(--warn)}
.b-bad{background:var(--bad-soft);color:var(--bad)}
.b-gray{background:#f1f5f9;color:var(--sub)}
.b-brand{background:var(--brand-soft);color:var(--brand)}

table{width:100%;border-collapse:collapse;font-size:16px;font-weight:700}
td{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:380px){table{font-size:15px}td{padding:9px 6px}}
th{text-align:left;color:var(--sub);font-size:12px;font-weight:700;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:10px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr.click{cursor:pointer}
tr.click:hover td{background:#f8fafc}
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
#sec-schedule .tablewrap{max-height:430px;overflow:auto}
#sec-schedule table th{position:sticky;top:0;background:#fff;z-index:2}
#sec-schedule table td:first-child{position:sticky;left:0;background:#fff;z-index:1}
#sec-schedule table th:first-child{position:sticky;left:0;top:0;background:#fff;z-index:3}
table.members td,table.members th{font-size:16px}

.formgrid{display:grid;gap:14px}
.field.full{grid-column:1/-1}
.checks{display:flex;gap:6px;flex-wrap:wrap}
.checks label.day{display:inline-flex;align-items:center;justify-content:center;width:40px;height:36px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;color:var(--ink);cursor:pointer;margin:0;font-weight:600}
.checks input{display:none}
.checks label.opt{display:inline-flex;align-items:center;padding:9px 12px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin:0}
.checks label.opt:has(input:checked){background:var(--grad);border-color:transparent;color:#fff}
.checks input:checked+span{color:#fff}
.checks label.day:has(input:checked){background:var(--grad);border-color:transparent;color:#fff}
.switch{display:flex;align-items:center;gap:8px;font-size:16px;color:var(--ink);font-weight:600;cursor:pointer}
.switch input{width:20px;height:20px}

.empty{text-align:center;color:var(--sub);padding:28px 10px;font-size:13.5px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.mt{margin-top:12px}
.muted{color:var(--sub);font-size:16px}
.big{font-size:17px;font-weight:700}
.copybox{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:16px;white-space:pre-wrap;line-height:1.7}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#312e81;color:#fff;padding:10px 20px;border-radius:99px;font-size:13.5px;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.detailgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.detailgrid .item{background:#f6f7fd;border-radius:14px;padding:10px 12px}
.detailgrid .item .k{font-size:11px;color:var(--sub);font-weight:700}
.detailgrid .item .v{font-size:14px;font-weight:600;margin-top:2px}
.progress{height:8px;background:#e2e8f0;border-radius:99px;overflow:hidden}
.progress i{display:block;height:100%;background:var(--grad);border-radius:99px}
.lessonday{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.lessonday .dh{background:#f1f5f9;padding:8px 12px;font-weight:800;font-size:13.5px}
.lessonday .dh.today{background:var(--grad);color:#fff}
.lessonday .li{padding:9px 12px;border-top:1px solid #f1f5f9;font-size:13.5px;cursor:pointer}
.lessonday .li:hover{background:#f8fafc}
.weekgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
@media(max-width:860px){.weekgrid{grid-template-columns:1fr}}
.searchbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.searchbar input,.searchbar select{width:auto;flex:1;min-width:120px}

</style>
</head>
<body>
<div id="lockScreen" style="position:fixed;inset:0;background:linear-gradient(160deg,#312e81 0%,#1e1b4b 60%,#0f0d2e 100%);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px">
  <div style="font-size:40px" id="lockIcon">🎷</div>
  <div style="color:#fff;font-weight:800;font-size:18px" id="lockTitle">회원관리</div>
  <div style="color:#94a3b8;font-size:13px;text-align:center" id="lockHint">이메일로 로그인하세요</div>
  <input type="email" id="authEmail" placeholder="이메일" autocomplete="username" style="max-width:270px;padding:12px">
  <input type="password" id="authPw" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" style="max-width:270px;padding:12px" onkeydown="if(event.key==='Enter')fbLogin()">
  <button class="btn primary" style="width:270px;justify-content:center;padding:12px" onclick="fbLogin()">로그인</button>
  <button class="btn" style="width:270px;justify-content:center" onclick="fbSignup()">처음이신가요? 회원가입</button>
  <button id="pwaInstallBtn" class="btn" style="display:none;width:270px;justify-content:center;background:#f59e0b;color:#fff;border-color:transparent;font-weight:800" onclick="pwaInstall()">📲 앱으로 설치 (홈 화면에 자동 추가)</button>
  <div id="iosGuide" style="display:none;color:#c7d2fe;font-size:13px;text-align:center;line-height:1.6;background:rgba(255,255,255,.08);border-radius:12px;padding:8px 14px">아이폰은 Safari 아래 <b>공유(↑)</b> 버튼 →<br><b>"홈 화면에 추가"</b>를 눌러 설치하세요</div>
  <a href="#" style="color:#64748b;font-size:12px" onclick="fbReset();return false">비밀번호를 잊으셨나요?</a>
  <div id="lockMsg" style="color:#f87171;font-size:13px;min-height:18px;text-align:center"></div>
  <div style="color:#475569;font-size:11.5px;text-align:center;max-width:300px">☁️ 데이터는 본인 계정의 클라우드에 안전하게 저장되어<br>폰을 바꿔도 로그인하면 그대로 유지됩니다<br><span style="color:#4c4a7a">버전 v0750c</span></div>
</div>
<div class="mobiletop"><div id="brandMobile">🎷 회원관리</div><div class="row" style="gap:6px">
  <button class="btn topnav" style="font-size:22px;padding:6px 14px" onclick="goBack()">◀</button>
  <button class="btn topnav" onclick="go('notify')">🔔 공지</button></div></div>
<div class="app">
  <aside class="sidebar">
    <div class="logo" id="brandSide">🎷 회원관리</div>
    <nav class="nav" id="sidenav"></nav>
    <div class="foot" id="sideFoot"></div>
  </aside>
  <main class="main" id="main"></main>
</div>
<nav class="tabbar" id="tabbar"></nav>
<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none">
<input type="file" id="vcfFile" accept=".vcf,.vcard,text/vcard,text/x-vcard" style="display:none">

<script>
/* ================= 데이터 ================= */
const DBKEY='saxadmin_v1';
const DAYS=['월','화','수','목','금','토','일'];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

const DEFAULT_TEMPLATES=[
 {id:'t1',name:'회비 납부 안내',body:'안녕하세요. {단체명}입니다.\n\n회원님의 회비 납부 예정일은 ({예정일})로 확인되나, 현재 납부 여부가 확인되지 않아 안내드립니다.\n\n이미 납부하신 경우에는 확인이 누락되었을 수 있으니 알려주시면 즉시 확인하겠습니다.\n\n항상 {단체명}을 이용해 주셔서 감사드리며, 즐겁고 행복한 하루 보내시기 바랍니다.\n감사합니다.'},
 {id:'t2',name:'회비 납부 예정 안내',body:'[{단체}] {이름}님, 안녕하세요. 🎷\n이번 달 회비({회비}원) 납부 예정일은 {예정일}입니다.\n미리 안내드립니다. 감사합니다!'},
 {id:'t3',name:'레슨 재등록 안내',body:'[{단체}] {이름}님, 안녕하세요. 🎷\n등록하신 레슨 {총횟수}회가 모두 진행되었습니다.\n계속 수강을 원하시면 레슨비 {레슨비}원 결제 부탁드립니다.\n감사합니다!'},
 {id:'t4',name:'레슨 진행 안내',body:'안녕하세요. {단체명}입니다.\n회원님의 레슨 진행 내용을 안내드립니다.\n\n{레슨회차}\n\n주요 레슨 내용\n(                    )\n\n차기 레슨에서는 (                    ) 부분을 중점적으로 연습할 예정입니다.\n\n회원님의 꾸준한 열정과 노력에 발맞추어 저희도 함께 배우고 연구하며 더욱 즐겁고 효과적인 레슨이 될 수 있도록 노력하겠습니다.\n\n회원님의 연주 기량이 한 단계 더 성장하고 색소폰 연주의 즐거움이 더욱 커지기를 바랍니다.\n\n항상 {단체명}을 이용해 주셔서 진심으로 감사드립니다.'},
 {id:'t5',name:'레슨 일정 변경 공지',body:'{이름}님, 안녕하세요. {상호}입니다.\n\n레슨 일정이 변경되어 안내드립니다.\n\n▶ 변경 내용: (문구 수정 버튼을 눌러 내용을 입력하세요)\n\n확인 부탁드립니다. 감사합니다.'},
 {id:'t6',name:'행사 공지 (전체)',body:'안녕하세요, {상호}입니다.\n\n▶ 행사 안내: (문구 수정 버튼을 눌러 내용을 입력하세요)\n\n많은 참여 부탁드립니다. 감사합니다.'}
];

function load(){
  try{const d=JSON.parse(localStorage.getItem(DBKEY));if(d&&d.members)return d;}catch(e){}
  return {groups:[],members:[],payLogs:[],lessonLogs:[],templates:JSON.parse(JSON.stringify(DEFAULT_TEMPLATES)),sentLogs:[]};
}
let db=load();
function migrateDb(){
db.groups=db.groups||[];db.members=db.members||[];db.payLogs=db.payLogs||[];db.lessonLogs=db.lessonLogs||[];db.templates=db.templates||[];db.sentLogs=db.sentLogs||[];
// 기본 템플릿 누락분 보충 (업데이트 대응)
DEFAULT_TEMPLATES.forEach(t=>{if(!db.templates.find(x=>x.id===t.id))db.templates.push(JSON.parse(JSON.stringify(t)));});
[['t1',['회비 미납 안내','연습실 이용기간 만료 안내']],['t4',['레슨비 미납 안내','레슨 등록기간 만료 안내','레슨비 납부 안내']]].forEach(([id,olds])=>{
  const cur=db.templates.find(t=>t.id===id);
  if(cur&&olds.includes(cur.name)){const nt=DEFAULT_TEMPLATES.find(t=>t.id===id);cur.name=nt.name;cur.body=nt.body;}
});
// 설정 기본값
db.settings=Object.assign({studioName:'studio MUSE',icon:'🎷',feeLabel:'회비',lessonTotal:4,ownerName:'studio MUSE',ownerContact:'',pin:'',lastBackup:''},db.settings||{});
// 금전출납부 기본값
db.ledger=db.ledger||[];
db.holidays=db.holidays||[]; // 전체 휴강일(행사 등)
db.retired=db.retired||[]; // 퇴회(자동삭제) 보관
db.members.forEach(m=>{if(m.groupLesson&&!m.groupPayDate)m.groupPayDate=m.regDate||todayStr0();});
function todayStr0(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const GCOLORS=['#6366f1','#10b981','#f59e0b','#ef4444','#0ea5e9','#8b5cf6','#ec4899','#14b8a6'];
(db.groups||[]).forEach((g,i)=>{if(!g.color)g.color=GCOLORS[i%GCOLORS.length];});
window.groupColorOf=m=>{const g=db.groups.find(x=>x.id===(m&&m.groupId));return (g&&g.color)||'#94a3b8';};

/* ================= 날짜 유틸 ================= */
const pad=n=>String(n).padStart(2,'0');
const iso=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const todayStr=()=>iso(new Date());
function addMonths(ds,n){
  const d=new Date(ds+'T00:00:00');const day=d.getDate();
  d.setMonth(d.getMonth()+n);
  if(d.getDate()<day)d.setDate(0); // 말일 보정 (1/31 +1개월 → 2/28)
  return iso(d);
}
function daysBetween(a,b){ // b - a (일수)
  return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);
}
const fmtDate=ds=>ds?ds.replace(/-/g,'.'):'-';
const fmtMD=ds=>ds?ds.slice(5).replace('-','.'):'-';
const fmtKdot=ds=>{if(!ds)return'-';const q=ds.split('-');return q[0]+'. '+Number(q[1])+'. '+Number(q[2]);};
const fmtKor=ds=>{if(!ds)return '-';const d=new Date(ds+'T00:00:00');return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';};
function addDays(ds,n){const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return iso(d);}
const fmtWon=n=>(n||0).toLocaleString('ko-KR');
const fmtPhone=s=>{const d=String(s||'').replace(/[^0-9]/g,'');if(d.length===11)return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);if(d.length===10)return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);return s||'';};
function timeOpts(sel){
  let out='<option value="">선택</option>';
  for(let h=11;h<=22;h++)for(let mi=0;mi<60;mi+=10){
    const t=pad(h)+':'+pad(mi);
    out+=`<option value="${t}" ${sel===t?'selected':''}>${t}</option>`;
  }
  return out;
}
function fmtPhoneInput(el){const d=el.value.replace(/[^0-9]/g,'').slice(0,11);let out=d;
  if(d.length>7)out=d.slice(0,3)+'-'+d.slice(3,d.length-4)+'-'+d.slice(-4);
  else if(d.length>3)out=d.slice(0,3)+'-'+d.slice(3);
  el.value=out;}

/* ================= 상태 계산 ================= */
// 회비: 납부일 +1개월 = 다음 예정일. 예정일 경과 시 '경과', 예정일+3일 초과 시 '미납(알림 대상)'
function cycExtraD(m){return m.feeCycleSp?(m.feeCycleD||0):0;}
function cycAdd(m,date,times){ // 주기 × times 더하기 (특수주기: n개월+n일)
  if(times<=0)return date;
  return addDays(addMonths(date,(m.feeCycle||1)*times),cycExtraD(m)*times);
}
function extShift(date,s,e){ // date를 휴회구간(s~e, 종료 포함)만큼 달력 기준 순연
  if(!date||!s||!e)return date;
  const end=addDays(e,1);
  let mo=0;
  while(addMonths(s,mo+1)<=end)mo++;
  const d2=Math.max(0,daysBetween(addMonths(s,mo),end));
  if(mo===0&&d2===0)return date;
  return addDays(addMonths(date,mo),d2);
}
// 회비 기준일: 회원정보 기준일과 '최근 납부기록(선납 개월 반영)' 중 뒤의 것
function feeAnchor(m){
  let base=m.feePayDate||'';
  const logs=db.payLogs.filter(p2=>p2.memberId===m.id&&p2.type==='fee'&&p2.memo!=='단체레슨').sort((a,b)=>b.date.localeCompare(a.date));
  if(logs.length){
    const lg=logs[0];
    let a2=cycAdd(m,lg.date,(lg.months||1)-1); // 선납 n개월 → 기준일 전진
    if(!base||a2>=base){
      (m.restHist||[]).forEach(h2=>{if(h2.s>=lg.date)a2=extShift(a2,h2.s,h2.e);}); // 미보정 휴회 이력 자동 순연
      base=a2;
    }
  }
  return base;
}
function restExtParts(m){ // 휴회 연장분: 달력 기준 {mo,d} — 1.23~3.22 휴회 = 정확히 2개월
  if(!m||!m.restDate||!m.restEnd)return{mo:0,d:0};
  const end=addDays(m.restEnd,1); // 종료일 포함
  let mo=0;
  while(addMonths(m.restDate,mo+1)<=end)mo++;
  const d=Math.max(0,daysBetween(addMonths(m.restDate,mo),end));
  return{mo,d};
}
function pushRestHist(m){
  if(!m||!m.restDate)return;
  m.restHist=[{s:m.restDate,e:m.restEnd||todayStr()},...(m.restHist||[])].slice(0,3);
}
function restHistText(m){
  return (m.restHist||[]).map(h=>fmtMD(h.s)+'~'+fmtMD(h.e)).join(' · ');
}
function restShift(m,date){ // 날짜를 휴회기간만큼 순연
  if(!date)return date;
  const e=restExtParts(m);
  if(e.mo===0&&e.d===0)return date;
  return addDays(addMonths(date,e.mo),e.d);
}
function feeStatus(m){
  if(m.memberType==='휴회회원'){
    const base0=feeAnchor(m);
    if(base0&&m.manageFee!==false){
      const due=restShift(m,cycAdd(m,base0,1));
      return{code:'rest',label:'휴회',due,over:0};
    }
    return{code:'rest',label:'휴회',due:null,over:0};
  }
  if(m.manageFee===false)return{code:'nofee',label:'레슨비만',due:null,over:0};
  const base=feeAnchor(m);
  if(!base)return{code:'none',label:'납부기록 없음',due:null,over:0};
  const due=cycAdd(m,base,1);
  const over=daysBetween(due,todayStr());
  if(over<=0)return{code:'ok',label:'정상',due,over};
  if(over<=3)return{code:'grace',label:'예정일 경과',due,over};
  return{code:'overdue',label:'미납',due,over};
}
function lessonStatus(m){
  if(!m.hasLesson)return null;
  const total=m.lessonTotal||4, done=m.lessonDone||0;
  return{total,done,finished:done>=total};
}
// 레슨 회차별 예정 날짜: 납부일(시작일)부터 등록 요일에 총횟수만큼. 휴강일은 건너뛰어 자동 연장
function lessonSessionDates(m,baseOpt){
  const base=baseOpt||m.lessonPayDate;
  if(!base||!(m.lessonDays||[]).length)return[];
  const skips=new Set([...(m.lessonSkips||[]).map(s=>s.date),...(db.holidays||[]).map(h=>h.date)]);
  const rs=m.restDate,re2=m.restEnd; // 휴회 구간 제외 (사용기간 연장)
  const total=m.lessonTotal||4, dates=[];
  let d=new Date(base+'T00:00:00'), guard=0;
  while(dates.length<total&&guard<370){
    const ds=iso(d);
    const inRest=rs&&re2&&ds>=rs&&ds<=re2;
    if(m.lessonDays.includes(DAYS[(d.getDay()+6)%7])&&!skips.has(ds)&&!inRest)dates.push(ds);
    d.setDate(d.getDate()+1);guard++;
  }
  return dates;
}
// 레슨비: 시작일(납부일)부터 총횟수(기본 4회) 진행 시 만료
function lessonFeeStatus(m){
  if(!m.hasLesson)return null;
  const total=m.lessonTotal||4, done=m.lessonDone||0;
  let base=m.lessonPayDate||'';
  const lg=db.payLogs.filter(p2=>p2.memberId===m.id&&p2.type==='lesson').sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(lg&&(!base||lg.date>base))base=lg.date; // 최근 레슨비 납부 기록 반영
  if(!base)return{code:'none',label:'납부기록 없음',due:null,over:0,total,done};
  const dates=lessonSessionDates(m,base);
  const due=dates.length?dates[dates.length-1]:addMonths(base,1); // 마지막 회차 예정일 = 만료 예정일
  if(done>=total)return{code:'overdue',label:total+'회 만료',due,over:0,total,done};
  const over=daysBetween(due,todayStr());
  if(over>3)return{code:'grace',label:'만료 예정일 경과',due,over,total,done};
  return{code:'ok',label:'진행중',due,over:0,total,done};
}
// 단체레슨비: 매월 1개월 주기, 회원별 기준일
function groupFeeStatus(m){
  if(!m.groupLesson)return null;
  let gbase=m.groupPayDate||'';
  const glog=db.payLogs.filter(p2=>p2.memberId===m.id&&p2.memo==='단체레슨').sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(glog&&(!gbase||glog.date>gbase))gbase=glog.date;
  if(!gbase)return{code:'none',label:'기록 없음',due:null,over:0};
  if(m.memberType==='휴회회원')return{code:'rest',label:'휴회',due:restShift(m,addMonths(gbase,1)),over:0};
  const due=addMonths(gbase,1);
  const over=daysBetween(due,todayStr());
  if(over<=0)return{code:'ok',label:'완납',due,over:0};
  if(over<=3)return{code:'grace',label:'경과',due,over};
  return{code:'overdue',label:'미납',due,over};
}

  const ms=msAll.filter(m=>!(/강사$/.test(String(m.instrument||''))||String(m.instrument||'')==='게스트')); // 수납·할일 대상 (관리자·총무 레슨비 포함)
  const msCount=msAll.filter(m=>!isStaffLike(m)); // 인원 집계용
  const lessonMs=msAll.filter(m=>m.hasLesson);
  const todayHol=(db.holidays||[]).find(x=>x.date===wd[DAYS.indexOf(todayDay)]);
  const todayLs=todayHol?[]:lessonMs.filter(m=>(m.lessonDays||[]).includes(todayDay)&&!(m.lessonSkips||[]).find(s=>s.date===wd[DAYS.indexOf(todayDay)]));
  const targets=ms.filter(m=>m.manageFee!==false||m.hasLesson||m.groupLesson);
  const unpaidN=targets.filter(m=>owedInfo(m).amt>0).length;
  const paidN=targets.length-unpaidN;
  const thisMonth=today.slice(0,7);
  const monthIncome=db.payLogs.filter(p=>p.date.startsWith(thisMonth)).reduce((s,p)=>s+(p.amount||0),0);
  const todayIncome=db.payLogs.filter(p=>p.date===today).reduce((s,p)=>s+(p.amount||0),0);
  const needBackup=ms.length>0&&(!S().lastBackup||daysBetween(S().lastBackup,today)>=7);
  const A=S().alerts||{};
  /* 오늘 할일 */
  const todos=[];
  ms.forEach(m=>{
    const st=feeStatus(m);
    if(A.over3!==false&&(st.code==='overdue'||st.code==='grace')&&((m.fee||0)+(m.useLocker?(m.lockerFee||0):0))>0)
      todos.push({t:`${m.name} 회원 ${FL()} 미납 ${st.over||0}일 경과`,noti:`copyNotice('${m.id}')`,pay:`quickPay('${m.id}')`});
    const gst=groupFeeStatus(m);
    if(A.over3!==false&&gst&&(gst.code==='overdue'||gst.code==='grace')&&(m.groupLessonFee||0)>0)
      todos.push({t:`${m.name} 회원 레슨비(단체) 미납 ${gst.over||0}일 경과`,noti:`copyNotice('${m.id}')`,pay:`payGroup('${m.id}')`});
    const lst=lessonFeeStatus(m);
    if(!SM()&&A.lessonRemain!==false&&m.hasLesson&&lessonStatus(m).finished)
      todos.push({t:`${m.name} 회원 개인레슨 ${lessonStatus(m).total}회 완료 — 재등록`,noti:`copyLessonNotice('${m.id}')`,pay:`payLesson('${m.id}')`});
    else if(A.over3!==false&&lst&&(lst.code==='grace'||lst.code==='overdue')&&(m.lessonFee||0)>0)
      todos.push({t:`${m.name} 회원 레슨비 미납 ${lst.over||0}일 경과`,noti:`copyLessonNotice('${m.id}')`,pay:`payLesson('${m.id}')`});
  });
  db.members.filter(m=>m.memberType==='휴회회원'&&m.restDate).forEach(m=>{
    const end=m.restEnd||addMonths(m.restDate,6);const left=daysBetween(today,end);
    if(left<=30)todos.push({t:`${m.name} 회원 휴회 종료 예정 (D-${Math.max(left,0)})`,noti:`copyRestNotice('${m.id}')`,view:`go('restList')`});
  });
  const it=(k,v,color,act)=>`<div class="item" style="cursor:pointer;padding:8px 10px" onclick="${act}"><div class="k" style="font-size:15px;font-weight:700">${k}</div><div class="v" style="font-size:20px;font-weight:800;color:${color}">${v}</div></div>`;
  const qb=(ico,l,act)=>`<button class="btn" style="flex:1;min-width:0;justify-content:center;font-size:15px;font-weight:800;padding:13px 2px;white-space:nowrap" onclick="${act}"><span>${ico}<br>${l}</span></button>`;
  return `
  <div class="pagehead"><div><h1 style="font-size:18px">${fmtDate(today)} (${todayDay})</h1><div class="sub" style="font-weight:700">${esc(S().studioName)}</div></div>
   <div class="row"><button class="btn sm" onclick="exportData()">백업</button><button class="btn sm" onclick="document.getElementById('importFile').click()">복원</button><button class="btn sm primary" onclick="appUpdate()">최신버전</button></div></div>
  ${needBackup?`<div class="card" style="background:var(--warn-soft)"><div class="row">
    <div>⚠️ <b>백업을 권장합니다.</b> <span class="muted">${S().lastBackup?'마지막 백업: '+fmtDate(S().lastBackup):'아직 백업 기록이 없습니다'}</span></div>
    <div class="spacer"></div><button class="btn sm primary" onclick="exportData()">지금 백업</button></div></div>`:''}
  ${(db.notices||[]).filter(n=>(n.kind==='행사일정'&&A.event!==false&&(!n.date||n.date>=today))||(n.kind==='회비납부'&&A.feePaid!==false)).map(n=>`
    <div class="card" style="background:var(--brand-soft);padding:10px 14px"><div class="row" style="align-items:center">
      <div style="flex:1;min-width:0">🔔 <b>${esc(n.title)}</b> <span class="muted" style="font-size:13px">${n.kind==='행사일정'?(n.date?fmtDate(n.date):'행사'):'회비 납부'} · ${esc(noticeTargetLabel(n.target))}</span></div>
      <button class="btn sm" style="flex:none" onclick="homeNotice=homeNotice==='${n.id}'?null:'${n.id}';render()">${homeNotice===n.id?'접기':'내용 확인'}</button></div>
    ${homeNotice===n.id?`<div class="copybox mt" style="white-space:pre-wrap">${esc(n.body||'(내용 없음)')}</div>`:''}</div>`).join('')}
  <div class="card" style="padding:10px;margin-bottom:6px"><h2 style="margin-bottom:6px;font-size:17px">📊 현황</h2>
    <div class="detailgrid" style="grid-template-columns:1fr 1fr;gap:6px">
      ${it('전체회원',msCount.length+'명','var(--brand)',"mFilter={q:'',group:'',status:''};membersTab='list';go('membersHub')")}
      ${it('등록회원(완납)',paidN+'명','var(--ok)',"mFilter={q:'',group:'',status:'paid'};membersTab='list';go('membersHub')")}
      ${it('미납회원',unpaidN+'명','var(--bad)',"mFilter={q:'',group:'',status:'unpaid'};membersTab='list';go('membersHub')")}
      ${SM()?it('이번달 수납액',fmtWon(monthIncome),'var(--ok)',"feesTab='fees';go('feesHub')")
        :it('오늘레슨',todayLs.length+'명','#8b5cf6',"lessonsTab='schedule';go('lessonsHub')")
        +it('이번달 수납액',fmtWon(monthIncome),'var(--ok)',"feesTab='ledger';go('feesHub')")
        +it('오늘 수납액',fmtWon(todayIncome),'var(--brand)',"feesTab='ledger';go('feesHub')")}
    </div></div>
  ${!SM()&&db.members.length===0?`<div class="card" style="background:var(--brand-soft)"><div class="row">
    <div><b>✨ 처음이신가요?</b> <span class="muted">이름·전화·회비·레슨비만 관리하는 간단 모드로 시작할 수 있습니다.</span></div>
    <div class="spacer"></div><button class="btn sm primary" onclick="toggleSimple(true)">간단 모드로 시작</button></div></div>`:''}
  <div class="card" style="padding:10px;margin-bottom:6px"><h2 style="margin-bottom:6px;font-size:17px">⚡ 빠른 실행</h2>
    <div class="row" style="gap:6px;flex-wrap:nowrap">
      ${qb('➕','회원등록',"membersTab='register';registerMode='single';go('membersHub')")}
      ${qb('✅','수납처리',"feesTab='fees';go('feesHub')")}
      ${SM()?'':qb('🗓','레슨확인',"lessonsTab='schedule';go('lessonsHub')")+qb('🧾','지출입력',"feesTab='ledger';go('feesHub')")}
    </div></div>
  <div class="card" style="padding:10px;margin-bottom:6px"><h2 style="margin-bottom:4px;font-size:17px">📌 오늘 할일 <b style="color:${todos.length?'var(--bad)':'var(--ok)'}">${todos.length}건</b></h2>
    ${todos.length?todos.slice(0,20).map(td=>`<div class="row" style="padding:7px 0;border-bottom:1px solid #f1f3fa;gap:5px;flex-wrap:nowrap;overflow:hidden;align-items:center">
      <span style="font-size:16px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(td.t)}</span>
      ${td.noti?`<button class="btn sm" style="padding:5px 8px;font-size:13px;flex:none" onclick="${td.noti}">알림</button>`:''}
      ${td.pay?`<button class="btn sm primary" style="padding:5px 8px;font-size:13px;flex:none" onclick="${td.pay}">수납</button>`:''}
      ${td.view?`<button class="btn sm" style="padding:5px 8px;font-size:13px;flex:none" onclick="${td.view}">보기</button>`:''}
    </div>`).join(''):'<div class="empty">오늘 처리할 일이 없습니다 👍</div>'}
  </div>
  <div class="card" style="padding:10px"><h2 style="margin-bottom:4px;font-size:17px">🕓 최근활동</h2>
    ${(()=>{const ev=recentActivity();return ev.length?ev.map(e=>`<div class="row" style="padding:6px 2px;border-bottom:1px solid #f5f6fb;flex-wrap:nowrap;overflow:hidden;align-items:center"><span class="muted" style="flex:none;min-width:64px;font-size:16px;font-weight:700">${Number(e.d.slice(5,7))}월 ${Number(e.d.slice(8,10))}일</span><span style="font-size:16px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.ico} ${esc(e.t)}</span></div>`).join(''):'<div class="empty">아직 활동 내역이 없습니다</div>';})()}
  </div>
`;
}

function retireMember(id){
  const m=db.members.find(x=>x.id===id);if(!m)return;
  if(!confirm(m.name+'님을 지금 퇴회 처리할까요?\n회원 명단에서 삭제되어 보관 명단으로 이동합니다.'))return;
  db.retired.push({...m,retiredAt:todayStr()});
  db.members=db.members.filter(x=>x.id!==id);
  save();render();toast(m.name+'님 퇴회 처리되었습니다');
}
function restoreMember(id){
  const m=db.members.find(x=>x.id===id);if(!m)return;
  if(!confirm(m.name+'님을 휴회에서 복귀시킬까요?\n(휴회 기간만큼 납부 예정일이 연장됩니다)'))return;
  if(!m.restEnd&&m.restDate)m.restEnd=todayStr(); // 종료일 미입력이면 오늘까지 휴회로 계산
  if(m.feePayDate)m.feePayDate=restShift(m,m.feePayDate);
  if(m.groupPayDate)m.groupPayDate=restShift(m,m.groupPayDate);
  pushRestHist(m);
  m.memberType='일반회원';m.restDate=null;m.restEnd=null;
  save();render();toast(m.name+'님 복귀 — 휴회 기간만큼 예정일이 연장되었습니다');
}
function addGroup(){
  const name=document.getElementById('gname').value.trim();
  if(!name)return toast('단체명을 입력하세요');
  db.groups.push({id:uid(),name,memo:document.getElementById('gmemo').value.trim()});
  save();render();toast('단체가 추가되었습니다');
}
function renameGroup(id){
  const g=db.groups.find(g=>g.id===id);const n=prompt('단체명 수정',g.name);
  if(n&&n.trim()){g.name=n.trim();save();render();}
}
function delGroup(id){
  const cnt=db.members.filter(m=>m.groupId===id).length;
  if(!confirm(cnt?`소속 회원이 ${cnt}명 있습니다. 삭제하면 회원의 소속이 '(미지정)'이 됩니다. 삭제할까요?`:'삭제할까요?'))return;
  db.groups=db.groups.filter(g=>g.id!==id);
  db.members.forEach(m=>{if(m.groupId===id)m.groupId=null;});
  save();render();
}

/* ================= 회원 목록 ================= */
let mFilter={q:'',group:'',status:''};
function vMembers(){
  let ms=db.members.filter(m=>!isLongRest(m));
  if(mFilter.q)ms=ms.filter(m=>m.name.includes(mFilter.q)||(m.phone||'').includes(mFilter.q));
  if(mFilter.group)ms=ms.filter(m=>m.groupId===mFilter.group);
  if(mFilter.status)ms=ms.filter(m=>{
    const st=feeStatus(m);
    if(mFilter.status==='paid')return owedInfo(m).amt===0&&(m.manageFee!==false||m.hasLesson||m.groupLesson);
    if(mFilter.status==='unpaid')return owedInfo(m).amt>0;
    if(mFilter.status==='overdue')return st.code==='overdue';
    if(mFilter.status==='grace')return st.code==='grace';
    if(mFilter.status==='ok')return st.code==='ok';
    if(mFilter.status==='lesson')return m.hasLesson;
    return true;});
  ms.sort((a,b)=>instRank(a)-instRank(b)||a.name.localeCompare(b.name,'ko'));
  return `<div class="pagehead"><div><h1>회원 목록</h1><div class="sub">이름을 누르면 회원 정보를 확인하고, [수정]으로 변경합니다 · 총 ${db.members.length}명</div></div>
    <div class="row"><button class="btn" onclick="exportCSV()">📊 엑셀</button><button class="btn" onclick="go('restList')">😴 휴회회원</button>
      <select style="width:auto;padding:10px 6px;font-weight:700" onchange="mFilter.group=this.value;renderList()">
        <option value="">전체 단체</option>
        ${db.groups.map(g=>`<option value="${g.id}" ${mFilter.group===g.id?'selected':''}>${esc(g.name)}</option>`).join('')}
      </select></div></div>
  <div class="searchbar">
    <input placeholder="이름·전화번호 검색" value="${esc(mFilter.q)}" oninput="mFilter.q=this.value;renderList()">
    <select onchange="mFilter.status=this.value;renderList()">
      <option value="">전체 상태</option><option value="paid" ${mFilter.status==='paid'?'selected':''}>완납(등록회원)</option>
      <option value="unpaid" ${mFilter.status==='unpaid'?'selected':''}>미납(전체)</option>
      <option value="ok" ${mFilter.status==='ok'?'selected':''}>정상</option>
      <option value="grace" ${mFilter.status==='grace'?'selected':''}>예정일 경과</option>
      <option value="overdue" ${mFilter.status==='overdue'?'selected':''}>미납</option>
      <option value="lesson" ${mFilter.status==='lesson'?'selected':''}>레슨 회원</option></select>
  </div>
  <div class="card" id="memberList">${memberTable(ms)}</div>`;
}
function memberTable(ms){
  if(!ms.length)return '<div class="empty">조건에 맞는 회원이 없습니다</div>';
  return `<div class="tablewrap"><table class="members"><tr><th>이름</th><th>구분</th><th>연락처</th><th>납부상태</th></tr>
  ${ms.map(m=>{const st=feeStatus(m);
    const gubun=(m.memberType||'일반회원').replace('회원','')+(m.lessonType?'·'+m.lessonType:'');
    return `<tr class="click" onclick="go('detail','${m.id}')"><td><b>${esc(m.name)}</b></td>
    <td style="font-weight:700">${esc(gubun)}</td><td style="font-weight:700">${esc(fmtPhone(m.phone))}</td>
    <td>${m.memberType==='휴회회원'?`<span class="badge b-gray">😴 휴회 ~${fmtMD(m.restEnd)}</span>`:(m.manageFee===false?lbadge(lessonFeeStatus(m)):badge(st))}</td></tr>`;}).join('')}</table></div>`;
}
function renderList(){
  let ms=db.members.filter(m=>!isLongRest(m));
  if(mFilter.q)ms=ms.filter(m=>m.name.includes(mFilter.q)||(m.phone||'').includes(mFilter.q));
  if(mFilter.group)ms=ms.filter(m=>m.groupId===mFilter.group);
  if(mFilter.status)ms=ms.filter(m=>{const st=feeStatus(m);
    if(mFilter.status==='paid')return owedInfo(m).amt===0&&(m.manageFee!==false||m.hasLesson||m.groupLesson);
    if(mFilter.status==='unpaid')return owedInfo(m).amt>0;
    if(mFilter.status==='overdue')return st.code==='overdue';
    if(mFilter.status==='grace')return st.code==='grace';
    if(mFilter.status==='ok')return st.code==='ok';
    if(mFilter.status==='lesson')return m.hasLesson;return true;});
  ms.sort((a,b)=>instRank(a)-instRank(b)||a.name.localeCompare(b.name,'ko'));
  document.getElementById('memberList').innerHTML=memberTable(ms);
}

let bulkStage=[],stageQuery='';
function parseVcf(text){
  const out=[];
  text.split(/BEGIN:VCARD/i).forEach(b=>{
    if(!/TEL|FN|\nN[;:]/i.test(b))return;
    let name='';
    const fn=b.match(/FN[^:\n]*:(.+)/i);
    if(fn)name=fn[1].trim();
    if(!name){const n=b.match(/\nN[^:\n]*:([^;\n]*);?([^;\n]*)/i);if(n)name=((n[1]||'')+(n[2]||'')).trim();}
    if(/QUOTED-PRINTABLE/i.test(b)&&name.indexOf('=')>=0){
      try{const bytes=name.replace(/=\r?\n/g,'').split('=').filter(Boolean).map(h=>parseInt(h,16));
      name=new TextDecoder('utf-8').decode(new Uint8Array(bytes));}catch(e){}
    }
    const tel=b.match(/TEL[^:\n]*:([+0-9\-\s()]+)/i);
    const phone=tel?tel[1].replace(/[^0-9]/g,''):'';
    if(name&&name.length<30)out.push({name,phone:phone?fmtPhone(phone):''});
  });
  return out;
}
document.addEventListener('change',function(ev){
  if(ev.target&&ev.target.id==='vcfFile'){
    const f=ev.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
      const rows=parseVcf(String(r.result||''));
      if(!rows.length)return toast('연락처를 읽지 못했습니다. .vcf 파일인지 확인하세요.');
      let added=0;
      rows.forEach(x=>{const pd=x.phone.replace(/[^0-9]/g,'');
        if(!bulkStage.find(y=>y.name===x.name&&y.phone.replace(/[^0-9]/g,'')===pd)){bulkStage.push({name:x.name,phone:x.phone,checked:true});added++;}});
      render();toast(added+'명 추가됨 (총 '+bulkStage.length+'명) — 검색·체크 후 등록하세요');
    };
    r.readAsText(f);
    ev.target.value='';
  }
});
async function pickContacts(){
  if(!('contacts' in navigator&&navigator.contacts.select))
    return toast('이 브라우저는 연락처 선택을 지원하지 않습니다. 붙여넣기를 이용하세요.');
  try{
    const cs=await navigator.contacts.select(['name','tel'],{multiple:true});
    if(!cs.length)return;
    let added=0,noPhone=0;
    cs.forEach(c=>{
      const name=(Array.isArray(c.name)&&c.name.length?String(c.name[0]):(c.name||'이름없음'));
      let phone='';
      if(Array.isArray(c.tel)&&c.tel.length)phone=String(c.tel[0]);
      else if(typeof c.tel==='string')phone=c.tel;
      phone=phone.trim();
      if(!phone)noPhone++;
      const pd=phone.replace(/[^0-9]/g,'');
      if(!bulkStage.find(x=>x.name===name&&x.phone.replace(/[^0-9]/g,'')===pd)){bulkStage.push({name,phone,checked:true});added++;}
    });
    render();
    toast(added+'명 추가됨'+(noPhone?' · 번호없음 '+noPhone+'명(✏️로 입력 가능)':'')+' — 총 '+bulkStage.length+'명');
  }catch(e){/* 사용자가 취소 */}
}

  if(!rows.length)return toast('선택된 사람이 없습니다');
  const gid=document.getElementById('bulkGroup').value||null;
  const existPhones=new Set(db.members.map(m=>(m.phone||'').replace(/[^0-9]/g,'')).filter(Boolean));

  const fresh=[],dup=[];

function parseBulk(text){
  const out=[];
  text.split(/\n+/).forEach(line=>{
    line=line.trim();if(!line)return;
    const parts=line.split(/[\t,]+|\s+/).filter(Boolean);
    let phone='';const names=[];
    parts.forEach(p=>{const d=p.replace(/[^0-9]/g,'');
      if(d.length>=9&&!phone)phone=p;else names.push(p);});
    const name=names.join(' ').trim();
    if(name)out.push({name,phone});
  });
  return out;
}

function memberMonthly(m){ // 월 청구 구성

function owedInfo(m){ // 미납 금액·일수 (회비성+단체+레슨 각각의 기준일로 판정)
  const st=feeStatus(m), lst=lessonFeeStatus(m), gst=groupFeeStatus(m);
  let amt=0,days=0;
  if(st.code==='overdue'||st.code==='grace'){amt+=(m.fee||0)+(m.useLocker?(m.lockerFee||0):0);days=Math.max(days,st.over||0);}
  if(gst&&(gst.code==='overdue'||gst.code==='grace')){amt+=(m.groupLessonFee||0);days=Math.max(days,gst.over||0);}
  if(lst&&lst.code==='overdue'){amt+=(m.lessonFee||0);days=Math.max(days,lst.over||0);}
  return{amt,days};
}

function doPayWin(id){
  const m=db.members.find(x=>x.id===id);if(!m)return;
  const d=(document.getElementById('pw_date')||{}).value||todayStr();
  const n=Number((document.getElementById('pw_months')||{}).value)||1;
  const method=(document.getElementById('pw_method')||{}).value||'계좌';
  const feeAmt=Number((document.getElementById('pw_fee')||{}).value)||0;
  const lesAmt=Number((document.getElementById('pw_lesson')||{}).value)||0;
  const ensAmt=Number((document.getElementById('pw_ens')||{}).value)||0;
  if(feeAmt<=0&&lesAmt<=0&&ensAmt<=0)return toast('납부할 금액을 입력하세요');

  let msg=[];
  if(feeAmt>0){
    if(!dupPayWarn(m.id,feeAmt,d))return;
    let anchor;
    if(m.memberType==='휴회회원'){ // 휴회 종료 → 새 시작일부터
      if(!m.restEnd)m.restEnd=d;
      pushRestHist(m);
      m.memberType='일반회원';m.restDate=null;m.restEnd=null;anchor=d;
      msg.push('휴회 종료·복귀');
    }else if(n<=1){
      anchor=d; // 일반 납부: 입력한 납부일부터 사용기간 산정
    }else{
      const hasPrior=db.payLogs.some(p2=>p2.memberId===m.id&&p2.type==='fee'&&p2.memo!=='단체레슨');
      if(!hasPrior)anchor=m.feePayDate||d; // 첫 선납: 최초납부일부터
      else anchor=(feeStatus(m).due)||m.feePayDate||d;
      if(!m.feePayDate)anchor=d;
    }
    m.feePayDate=cycAdd(m,anchor,n-1);
    db.payLogs.push({id:uid(),memberId:m.id,date:d,amount:feeAmt,type:'fee',method,months:n,memo:(m.useLocker?FL()+'+락카':FL())+(n>1?' '+n+'개월 선납':'')+' ('+method+')'});
    msg.push(FL()+' '+fmtWon(feeAmt)+(n>1?' ('+n+'개월)':''));
  }
  if(lesAmt>0){
    if(!dupPayWarn(m.id,lesAmt,d))return;
    m.lessonPayDate=d;m.lessonDone=0;
    db.payLogs.push({id:uid(),memberId:m.id,date:d,amount:lesAmt,type:'lesson',method,memo:'레슨 ('+method+')'});
    msg.push('레슨비 '+fmtWon(lesAmt));
  }
  if(ensAmt>0){
    if(!dupPayWarn(m.id,ensAmt,d))return;
    const gst2=groupFeeStatus(m);
    m.groupPayDate=(gst2&&gst2.due)||d;
    db.payLogs.push({id:uid(),memberId:m.id,date:d,amount:ensAmt,type:'fee',method,memo:'단체레슨'});
    msg.push('앙상블 '+fmtWon(ensAmt));
  }
  payWin=null;save();render();
  const nd=feeStatus(m).due;
  toast(m.name+' '+msg.join(' · ')+' 수납'+(nd?' — 다음 예정일 '+fmtKdot(nd):''));
  const items=[];
  if(feeAmt>0)items.push(FL());
  if(lesAmt>0)items.push('레슨비');
  if(ensAmt>0)items.push('앙상블레슨비');
  payThanks(m,items,d);
}
function exemptFee(id){
  const m=db.members.find(x=>x.id===id);if(!m)return;
  const d=(document.getElementById('pw_date')||{}).value||todayStr();

function payDueNow(id){ // 미납분 즉시 납부 (오늘)
  const m=db.members.find(x=>x.id===id);if(!m)return;
  const st=feeStatus(m),lst=lessonFeeStatus(m),gst=groupFeeStatus(m);
  const items=[];
  if(m.manageFee!==false&&(st.code==='overdue'||st.code==='grace'))items.push([FL()+(m.useLocker?'+락카':''),pwBase(m)]);
  if(m.hasLesson&&lst&&(lst.code==='overdue'||lst.code==='grace'))items.push(['레슨비',m.lessonFee||0]);
  if(m.groupLesson&&gst&&(gst.code==='overdue'||gst.code==='grace'))items.push(['레슨비(단체)',m.groupLessonFee||0]);
  if(!items.length)return toast('미납 항목이 없습니다');
  const total=items.reduce((s,[,a])=>s+a,0);
  const d=todayStr();
  items.forEach(([l,a])=>{
    if(l.startsWith(FL())){m.feePayDate=d;db.payLogs.push({id:uid(),memberId:id,date:d,amount:a,type:'fee',memo:m.useLocker?FL()+'+락카':FL()});}
    else if(l==='레슨비'){m.lessonPayDate=d;m.lessonDone=0;db.payLogs.push({id:uid(),memberId:id,date:d,amount:a,type:'lesson',memo:'레슨 재등록'});}
    else{m.groupPayDate=(gst&&gst.due)||d;db.payLogs.push({id:uid(),memberId:id,date:d,amount:a,type:'fee',memo:'단체레슨'});}
  });
  save();render();toast(m.name+' '+fmtWon(total)+' 수납 완료 — 잘못 눌렀으면 출납부에서 삭제');
  payThanks(m,items.map(([l])=>l.startsWith(FL())?FL():l),d);
}

  return DAYS.map((_,i)=>{const d=new Date(t);d.setDate(t.getDate()+i);return iso(d);});

    const list=lessonMs.filter(m=>schedOf(m)&&(m.lessonDays||[]).includes(d)&&m.lessonTime).map(m=>{
      const q=m.lessonTime.split(':');const st=(Number(q[0])-11)*60+Number(q[1]);

    });
    // 추가 레슨 블록
    lessonMs.filter(m=>m.l2Type&&m.l2Time&&(m.l2Days||[]).includes(d)).forEach(m=>{
      const co=m.l2Type==='드럼레슨'?'드럼':'색소폰';

      const q2=(db.prices||[]).find(x=>x.name===m.l2Type||x.name.startsWith(m.l2Type));
      list.push({m,start:st,end:st+((q2&&q2.len)||(m.l2Type==='레슨1'?30:60)),extra:true});

function settleSend(tname){
  const ym=settleYM;
  const cnt={};
  db.lessonLogs.forEach(l=>{if(l.date.startsWith(ym)&&['완료','보강','결석'].includes(l.status))cnt[l.memberId]=(cnt[l.memberId]||0)+1;});
  const list=db.members.filter(m=>m.hasLesson&&cnt[m.id]&&(((m.teacher||'').trim()||'(강사 미지정)')===tname));
  if(!list.length)return toast('내역이 없습니다');
  const L=['['+S().studioName+'] '+Number(ym.slice(5,7))+'월 레슨 내역 — '+tname+'님'];
  let tot=0;
  list.forEach(m=>{tot+=cnt[m.id];L.push('· '+m.name+' '+cnt[m.id]+'회 (레슨비 '+fmtWon(m.lessonFee||0)+')');});
  L.push('─────');
  L.push('총 '+tot+'회');
  L.push('한 달 동안 수고 많으셨습니다. 감사합니다.');
  const txt=L.join('\n');
  copyText(txt,tname+'님 정산 내역 복사 — 카톡·문자에 붙여넣으세요');
  const tm2=db.members.find(x=>x.name===tname&&/강사$/.test(String(x.instrument||'')));
  const tel=tm2?(tm2.phone||'').replace(/[^0-9]/g,''):'';
  if(tel)location.href='sms:'+tel+'?body='+encodeURIComponent(txt);
  else openKakao();
}

function recalcDone(m){
  const ss=new Set();
  db.lessonLogs.forEach(l=>{
    if(l.memberId===m.id&&['완료','보강','결석'].includes(l.status))
      ss.add(l.session?('s'+l.session):('d'+l.date+(l.status==='보강'?'b':'')));
  });
  m.lessonDone=ss.size;
}
function delRecLog(mid,lid){
  if(!confirm('이 레슨 기록을 삭제할까요?'))return;
  const m=db.members.find(x=>x.id===mid);
  db.lessonLogs=db.lessonLogs.filter(l=>l.id!==lid);
  if(m)recalcDone(m);
  save();render();toast('기록이 삭제되었습니다');
}
function delRecSkip(mid,sid){
  if(!confirm('이 휴강일을 삭제할까요?'))return;
  const m=db.members.find(x=>x.id===mid);
  if(m)m.lessonSkips=(m.lessonSkips||[]).filter(s=>s.id!==sid);
  save();render();toast('휴강일이 삭제되었습니다');
}
function saveRecEdit(mid){
  const m=db.members.find(x=>x.id===mid);if(!m)return;
  const total=m.lessonTotal||4;
  // 기존 기록: 날짜·결석·휴강 반영
  db.lessonLogs.filter(l=>l.memberId===mid&&l.status).forEach(l=>{
    const d=document.getElementById('rec_d_'+l.id);
    const c=document.getElementById('rec_c_'+l.id);
    const h=document.getElementById('rec_h_'+l.id);
    const a=document.getElementById('rec_a_'+l.id);
    if(d&&d.value)l.date=d.value;
    if(h&&h.checked){ // 휴강 전환: 기록 제거 + 휴강일 추가 (1회 순연)
      m.lessonSkips=m.lessonSkips||[];
      if(!m.lessonSkips.find(s=>s.date===l.date))m.lessonSkips.push({id:uid(),date:l.date,memo:'휴강'});
      l._del=true;
    }else if(a&&a.checked){l.status='결석';}
    else if(c&&c.checked){l.status=(l.status==='보강'?'보강':'완료');}
    else if(c&&!c.checked){l._del=true;} // 전부 해제 → 기록 삭제
  });
  db.lessonLogs=db.lessonLogs.filter(l=>!l._del);
  // 예정 회차: 완료/결석/휴강 체크 반영
  for(let i2=1;i2<=total;i2++){
    const nd=document.getElementById('rec_n_'+i2);if(!nd)continue;
    const d=nd.value||todayStr();
    const done=document.getElementById('rec_nc_'+i2);
    const ab=document.getElementById('rec_na_'+i2);
    const hd=document.getElementById('rec_nh_'+i2);
    if(hd&&hd.checked){
      m.lessonSkips=m.lessonSkips||[];
      if(!m.lessonSkips.find(s=>s.date===d))m.lessonSkips.push({id:uid(),date:d,memo:'휴강'});
    }else if(done&&done.checked){db.lessonLogs.push({id:uid(),memberId:mid,date:d,session:i2,status:'완료'});}
    else if(ab&&ab.checked){db.lessonLogs.push({id:uid(),memberId:mid,date:d,session:i2,status:'결석'});}

function recSms(id){
  const m=db.members.find(x=>x.id===id);if(!m)return;
  const total=m.lessonTotal||4;
  const base=m.lessonPayDate||'';
  const logs=db.lessonLogs.filter(l=>l.memberId===id&&l.status&&(!base||l.date>=base)).sort((a,b)=>(a.session||0)-(b.session||0)||a.date.localeCompare(b.date));
  const bySession={};logs.forEach(l=>{if(l.session&&!bySession[l.session])bySession[l.session]=l;});
  const kd=ds=>{const q=ds.split('-');return q[0]+'년 '+Number(q[1])+'월 '+Number(q[2])+'일';};
  const L=[];
  L.push(m.name+'님, 레슨 받으시느라 수고 많으셨습니다. 레슨 진행 현황을 안내드립니다.');
  L.push('');
  L.push('■ 레슨 현황');
  for(let i2=1;i2<=total;i2++){
    const lg=bySession[i2];
    L.push('* '+i2+'회차 : '+(lg?kd(lg.date)+(lg.status==='결석'?' (결석)':''):'(예정)'));
  }
  const skips=(m.lessonSkips||[]).filter(s=>!base||s.date>=base);
  if(skips.length)L.push('* 휴강 : '+skips.map(s=>kd(s.date)).join(', '));
  const abs=logs.filter(l=>l.status==='결석');
  if(abs.length)L.push('* 결석 : '+abs.map(l=>kd(l.date)).join(', '));
  if(m.lessonMemo){L.push('');L.push('■ 주요 레슨 내용');L.push(m.lessonMemo);}
  L.push('');
  L.push('앞으로도 회원님과 함께 발전하도록 최선을 다하겠습니다.');
  L.push('감사합니다.  '+S().studioName);
  const txt=L.join('\n');
  copyText(txt,'레슨 현황 문자가 복사되었습니다 — 카톡에도 붙여넣을 수 있어요');
  const tel=(m.phone||'').replace(/[^0-9]/g,'');
  if(tel)location.href='sms:'+tel+'?body='+encodeURIComponent(txt);
  else openKakao();
}

function assignAt(d,slot){
  const sh=Number(slot.split(':')[0]), sm=Number(slot.split(':')[1]);
  const lessonMs0=db.members.filter(m=>m.hasLesson&&m.memberType!=='휴회회원');
  const noLesson=db.members.filter(m=>!m.hasLesson&&m.memberType!=='휴회회원'&&!/강사$/.test(String(m.instrument||'')));
  const lessonMs=lessonMs0.concat(noLesson);
  if(!lessonMs.length)return toast('배정할 회원이 없습니다. 회원 등록을 먼저 하세요.');
  const names=(PRO()?'0. 앙상블 (90분)\n':'')+lessonMs.map((m,i)=>(i+1)+'. '+m.name+(m.hasLesson?((m.lessonDays||[]).length?' ('+(m.lessonDays||[]).join('·')+' '+(m.lessonTime||'')+')':''):' (레슨 미설정)')).join('\n');
  const pick=prompt(d+'요일 '+slot+'에 배정할 회원 번호를 입력하세요\n'+names);
  if(pick==null)return;
  if(PRO()&&pick.trim()==='0'){
    let ln=prompt('앙상블 시간을 선택하세요 (90 또는 120분)','90');
    if(ln==null)return;
    ln=Number(ln)===120?120:90;
    db.ens=db.ens||[];
    db.ens.push({id:uid(),day:d,time:slot,len:ln});
    save();render();toast(d+'요일 '+slot+' 앙상블('+ln+'분) 배치 — 블록을 누르면 삭제');
    return;
  }
  const idx=Number(pick)-1;
  if(!(idx>=0&&idx<lessonMs.length))return toast('번호를 다시 확인하세요');
  const m=lessonMs[idx];
  if(!m.hasLesson){ // 레슨 미설정 회원 — 그 자리에서 레슨종류 지정
    const lp=prompt(m.name+'님은 레슨종류가 없습니다. 지정할 번호를 입력하세요\n1. 레슨1 (30분)\n2. 레슨2 (60분)\n3. 드럼레슨','1');
    if(lp==null)return;
    const lt=lp.trim()==='2'?'레슨2':(lp.trim()==='3'?'드럼레슨':'레슨1');
    m.hasLesson=true;m.lessonType=lt;
    m.lessonFee=['관리자','총무','게스트'].includes(String(m.instrument||''))&&lt!=='드럼레슨'?0:(priceOf(lt)||120000);
    m.lessonLen=lt==='레슨1'?30:60;
    if(!m.lessonPayDate)m.lessonPayDate=todayStr();
    m.lessonTotal=m.lessonTotal||S().lessonTotal||4;m.lessonDone=m.lessonDone||0;
  }
  const opts=sm===0?'0, 10, 20':'30, 40, 50';
  let mm=prompt('시작 분을 입력하세요 ('+opts+')',String(sm));
  if(mm==null)return;
  let mi=Math.round(Number(mm)/10)*10;
  if(isNaN(mi)||mi<sm||mi>sm+20)mi=sm;
  let which='1';
  if(m.l2Type){
    which=prompt(m.name+'님은 추가 레슨이 있습니다.\n1 = 본레슨('+(m.lessonType||'레슨')+')  2 = 추가 레슨('+m.l2Type+')','1')||'1';
  }
  if(which.trim()==='2'){
    m.l2Days=m.l2Days||[];
    if(!m.l2Days.includes(d))m.l2Days.push(d);
    m.l2Time=pad(sh)+':'+pad(mi);
    save();render();toast(m.name+'님 추가 레슨 배정: '+d+'요일 '+m.l2Time);
    return;
  }
  if(!(m.lessonDays||[]).includes(d))(m.lessonDays=m.lessonDays||[]).push(d);
  m.lessonTime=pad(sh)+':'+pad(mi);
  save();render();toast(m.name+'님 배정: '+d+'요일 '+m.lessonTime+' (회원정보에도 반영됨)');
}

let notifyTplId=null;
function lessonRoundsText(m){
  const total=m.lessonTotal||4;
  const done=db.lessonLogs.filter(l=>l.memberId===m.id&&(l.status==='완료'||l.status==='보강')&&(!m.lessonPayDate||l.date>=m.lessonPayDate)).sort((a,b)=>a.date.localeCompare(b.date));
  const sched=lessonSessionDates(m);
  const lines=[];
  for(let i=0;i<total;i++){
    if(done[i])lines.push('• '+(i+1)+'회차 : '+fmtDate(done[i].date));
    else lines.push('• '+(i+1)+'회차 : '+(sched[i]?fmtDate(sched[i])+' (예정)':'미정'));
  }
  return lines.join('\n');
}
function fillTemplate(body,m){
  const st=feeStatus(m);
  const lst=lessonFeeStatus(m);
  // 이용기간: 회비 납부일 ~ 다음 예정일 하루 전 (예: 6월 3일 납부 → 6월 3일 ~ 7월 2일)
  const start=m.feePayDate||'', end=st.due?addDays(st.due,-1):'';
  const period=start&&end?fmtDate(start)+' ~ '+fmtDate(end):'-'; // 예: 2026.01.01 ~ 2026.01.31
  // 레슨기간: 레슨비 납부일(시작일) ~ 마지막 회차(총횟수) 예정일
  const lStart=m.lessonPayDate||'', lEnd=lst&&lst.due?lst.due:'';
  const lPeriod=lStart&&lEnd?fmtDate(lStart)+' ~ '+fmtDate(lEnd):'-';
  return body
    .replaceAll('{이름}',m.name)
    .replaceAll('{단체명}',groupName(m.groupId)).replaceAll('{단체}',groupName(m.groupId))
    .replaceAll('{상호}',S().studioName)
    .replaceAll('{이용기간}',period)
    .replaceAll('{시작일}',fmtDate(start)).replaceAll('{만료일}',fmtDate(end))
    .replaceAll('{레슨기간}',lPeriod)
    .replaceAll('{레슨시작일}',fmtDate(lStart)).replaceAll('{레슨만료일}',fmtDate(lEnd))
    .replaceAll('{예정일}',st.due?fmtKdot(st.due):'-')
    .replaceAll('{레슨예정일}',lst&&lst.due?fmtKdot(lst.due):'-')
    .replaceAll('{레슨회차}',lessonRoundsText(m))
    .replaceAll('{납부금액}',fmtWon(memberMonthly(m).total)).replaceAll('{회비}',fmtWon(m.fee)).replaceAll('{레슨비}',fmtWon(m.lessonFee))
    .replaceAll('{총횟수}',String(m.lessonTotal||4)).replaceAll('{전화번호}',m.phone||'');
}
function getTargets(tpl){

  if(tpl.id==='t4')return{list:db.members.filter(m=>m.hasLesson&&m.memberType!=='휴회회원'),label:'레슨 진행 안내 대상 (레슨 회원)'};
  if(tpl.id==='t5')return{list:db.members.filter(m=>m.hasLesson),label:'레슨 회원 전체'};
  if(tpl.id==='t6')return{list:db.members.slice(),label:'전체 회원'};

    return{list:db.members.filter(m=>m.memberType!=='휴회회원'&&m.groupLesson),label:'앙상블 회원'};

    return{list:db.members.filter(m=>/강사$/.test(String(m.instrument||'')))
,label:'강사'};

function ledgerEntries(year){
  const es=[];
  db.payLogs.forEach(p=>{if(p.date.startsWith(year)){
    const m=db.members.find(x=>x.id===p.memberId);
    es.push({id:'auto_'+p.id,date:p.date,kind:'in',category:(p.type==='lesson'||p.memo==='단체레슨')?'레슨비':FL(),amount:p.amount||0,memo:(m?m.name:'(삭제된 회원)')+(p.memo==='단체레슨'?' (단체)':''),auto:true});}});
  db.ledger.forEach(l=>{if(l.date.startsWith(year))es.push(l);});
  return es.sort((a,b)=>b.date.localeCompare(a.date)||String(b.id).localeCompare(String(a.id)));
}

function addLedger(){
  const date=document.getElementById('lgDate').value;
  const kind=document.getElementById('lgKind').value;
  const category=document.getElementById(kind==='in'?'lgCatIn':'lgCatOut').value;
  const amount=Number(document.getElementById('lgAmount').value);
  const memo=document.getElementById('lgMemo').value.trim();
  if(!date)return toast('날짜를 선택하세요');
  if(!amount||amount<=0)return toast('금액을 입력하세요');
  db.ledger.push({id:uid(),date,kind,category,amount,memo});
  ledgerYear=date.slice(0,4);
  save();render();toast((kind==='in'?'수입':'지출')+' '+fmtWon(amount)+'원 기록됨');
}
function delLedger(id){

function addCat(kind){
  const name=prompt(kind==='income'?'새 수입 항목 이름':'새 지출 항목 이름');
  if(!name||!name.trim())return;
  const list=kind==='income'?db.cats.income:db.cats.expense;
  if(list.includes(name.trim()))return toast('이미 있는 항목입니다');
  list.push(name.trim());save();render();
}
function delCat(kind,name){
  if(!confirm(`'${name}' 항목을 삭제할까요? (기존 기록은 유지됩니다)`))return;
  if(kind==='income')db.cats.income=db.cats.income.filter(c=>c!==name);

  save();render();
}
function exportLedgerCSV(){
  const es=ledgerEntries(ledgerYear).slice().sort((a,b)=>a.date.localeCompare(b.date));

  const csv='﻿'+rows.map(r=>r.map(c=>'"'+String(c??'').replace(/"/g,'""')+'"').join(',')).join('\n');

let lockerEdit=null;
let lockerGroup='';
function lockerNos(m){return String(m.locker||'').split(',').map(x=>x.trim()).filter(Boolean);}
function lockerCheck(no,id){
  const other=db.members.find(x=>x.id!==id&&lockerNos(x).includes(String(no)));
  if(other){toast('⚠️ '+no+'번은 '+other.name+'님이 사용중입니다');return false;}
  const mine=db.members.find(x=>x.id===id&&lockerNos(x).includes(String(no)));
  if(mine){toast(no+'번은 이미 본인이 사용중입니다');return false;}
  const tot=S().lockerTotal||0;
  if(tot&&Number(no)>tot){toast('전체 락카 수('+tot+'개)를 넘는 번호입니다');return false;}
  return true;
}
function changeLocker(id,oldNo){
  const m=db.members.find(x=>x.id===id);if(!m)return;
  const no=((document.getElementById('lockerNewNo')||{}).value||'').trim();
  if(!no)return toast('새 락카번호를 입력하세요');
  if(!lockerCheck(no,id))return;
  const nos=lockerNos(m).map(x=>x===String(oldNo)?String(no):x);
  m.locker=nos.join(',');lockerEdit=null;save();render();
  toast(m.name+'님 락카 '+oldNo+'번 → '+no+'번 변경됨');
}
function addLockerNo(id){
  const m=db.members.find(x=>x.id===id);if(!m)return;
  const no=((document.getElementById('lockerAddNo')||{}).value||'').trim();
  if(!no)return toast('추가할 락카번호를 입력하세요');
  if(!lockerCheck(no,id))return;
  const nos=lockerNos(m);nos.push(String(no));
  m.locker=nos.join(',');m.useLocker=true;lockerEdit=null;save();render();
  toast(m.name+'님 락카 '+no+'번 추가 — 현재 '+nos.join(', ')+'번');
}

function courseOf(m){ // 강좌 분류: ① 담당강사=총무 → 색소폰드럼강좌(전용) ② 담당 강사의 구분 ③ 회원 구분 순
  const t=(m.teacher||'').trim();
  if(t){
    const cm=db.members.find(x=>String(x.name||'').trim()===t&&String(x.instrument||'')==='총무');
    if(cm||t===String((S().chongmuName||'')).trim()&&t)return 'sd'; // 총무 전용강좌
    const tm2=db.members.find(x=>x.name===t&&/강사$/.test(String(x.instrument||'')));
    if(tm2){
      if(tm2.instrument==='색소폰드럼강사')return 'sd';
      if(tm2.instrument==='드럼강사')return '드럼';
      if(tm2.instrument==='색소폰강사')return '색소폰';
    }
  }
  if(String(m.instrument||'')==='색소폰+드럼'||m.lessonType==='색소폰+드럼')return 'sd';
  if(isDrum(m)||m.lessonType==='드럼레슨')return '드럼';
  return '색소폰';
}

let roomMove=null;
let roomSel=null;

function roomName(r){return [r.group,r.place,r.inst].filter(Boolean).join(' ')||'연습실';}
function isStaffLike(m){const i=String(m.instrument||'');return /강사$/.test(i)||i==='관리자'||i==='총무'||i==='게스트';}
function instRank(m){const i=String(m.instrument||'');if(/강사$/.test(i))return 1;if(i==='관리자')return 2;if(i==='총무')return 2;if(i==='게스트')return 3;return 0;}
function isDrum(m){return String(m.instrument||'').includes('드럼');}
function roomMembers(rid){
  const first=(db.rooms2||[])[0];
  return db.members.filter(m=>!isLongRest(m)&&(isDrum(m)||String(m.instrument||'')==='관리자')&&(m.roomId===rid||(!m.roomId&&first&&first.id===rid)));
}
function roomBlocksOf(rid,d){
  const H0=6;const list=[];
  roomMembers(rid).forEach(m=>{
    (m.useSlots||[]).filter(x=>x.day===d).forEach(x=>{
      list.push({kind:'w',id:m.id,wid:x.id,label:m.name,start:x.start-H0,end:(x.end>x.start?x.end:x.start+1)-H0,color:(d==='토'||d==='일')?'#0ea5e9':'#f59e0b'});
    });
  });
  list.sort((a,b)=>a.start-b.start||a.end-b.end);
  const lanes=[];
  list.forEach(b=>{let li=lanes.findIndex(x=>x<=b.start);
    if(li<0){lanes.push(b.end);li=lanes.length-1;}else lanes[li]=b.end;b.lane=li;});
  list.lc=Math.max(1,lanes.length);
  return list;
}
function roomCellTap(d,hour){
  if(roomMove){
    const m=db.members.find(x=>x.id===roomMove.id);if(!m){roomMove=null;return;}
    const sl=(m.useSlots||[]).find(x=>x.id===roomMove.wid);if(!sl){roomMove=null;render();return;}
    const dur=Math.max(1,sl.end-sl.start);
    if(hour+dur>22)return toast('종료가 22시를 넘습니다');
    sl.day=d;sl.start=hour;sl.end=hour+dur;
    roomMove=null;save();render();toast(m.name+' → '+d+' '+pad(hour)+':00~'+pad(hour+dur)+':00 이동');
    return;
  }
  wkPick={day:d,hour};render();
}
function wkAssign(mid){
  if(!wkPick)return;
  const m=db.members.find(x=>x.id===mid);if(!m)return;
  let dur=Number(prompt('이용 시간을 입력하세요 (1~4시간)','2'))||2;

function runAudit(){
  const today=todayStr();
  const issues=[];
  const act=db.members.filter(m=>m.memberType!=='휴회회원'||!isLongRest(m));
  act.forEach(m=>{
    if(/강사$/.test(String(m.instrument||'')))return;
    const logs=db.payLogs.filter(p2=>p2.memberId===m.id);
    const st=feeStatus(m), lst=lessonFeeStatus(m), gst=groupFeeStatus(m);
    const o=owedInfo(m);
    // ① 미납인데 최근 45일 내 납부 기록 존재 (모순 의심)
    if(o.amt>0){
      const recent=logs.filter(p2=>daysBetween(p2.date,today)<=45&&p2.amount>0);
      if(recent.length)issues.push({t:'모순 의심',n:m.name,d:'미납 표시인데 최근 45일 내 납부 '+recent.length+'건 ('+recent.map(p2=>fmtMD(p2.date)+' '+fmtWon(p2.amount)).join(', ')+')'});
    }
    // ② 유료 회원인데 납부 기록 전무
    if(((m.fee||0)>0&&m.manageFee!==false)&&!logs.some(p2=>p2.type==='fee'&&p2.memo!=='단체레슨'))
      issues.push({t:'기록 없음',n:m.name,d:FL()+' 납부 기록이 한 건도 없습니다'});
    if(m.hasLesson&&(m.lessonFee||0)>0&&!logs.some(p2=>p2.type==='lesson'))
      issues.push({t:'기록 없음',n:m.name,d:'레슨비 납부 기록이 한 건도 없습니다'});
    // ②-2 중복 회원 (같은 이름 2건 이상)
    (()=>{const cnt={};db.members.forEach(m=>{const k=String(m.name||'').trim();cnt[k]=(cnt[k]||[]).concat(m);});
      Object.keys(cnt).forEach(k=>{if(cnt[k].length>1)issues.push({t:'중복 회원',n:k,d:cnt[k].length+'건 등록됨'+(cnt[k].some(x=>x.roomNo)?' (개인실 '+cnt[k].map(x=>x.roomNo||'-').join('/')+')':'')+' — 회원 목록에서 불필요한 1건을 퇴회·삭제하세요'});});})();
    // ③ 중복 의심 (같은 금액·7일 이내 2건)
    const sorted=logs.slice().sort((a,b)=>a.date.localeCompare(b.date));
    for(let i2=1;i2<sorted.length;i2++){
      const a=sorted[i2-1],b=sorted[i2];
      if(a.amount===b.amount&&a.amount>0&&a.type===b.type&&Math.abs(daysBetween(a.date,b.date))<=7)
        issues.push({t:'중복 의심',n:m.name,d:fmtMD(a.date)+' / '+fmtMD(b.date)+' '+fmtWon(a.amount)+' 2건 — 출납부에서 확인'});
    }
    // ④ 이상 금액
    logs.forEach(p2=>{if(p2.amount<0)issues.push({t:'이상 금액',n:m.name,d:fmtMD(p2.date)+' 음수 금액 '+fmtWon(p2.amount)});});
    // ⑤ 회차 초과
    if(m.hasLesson&&(m.lessonDone||0)>(m.lessonTotal||4))
      issues.push({t:'회차 초과',n:m.name,d:'진행 '+m.lessonDone+'회 > 총 '+(m.lessonTotal||4)+'회'});
    // ⑥ 무료·면제인데 미납 흔적
    if(m.manageFee===false&&(m.fee||0)===0&&o.amt>0)
      issues.push({t:'면제 확인',n:m.name,d:'면제 회원인데 미납액 '+fmtWon(o.amt)+' — 레슨비·단체 설정 확인'});
  });
  const el=document.getElementById('auditResult');
  if(!el)return;
  if(!issues.length){el.innerHTML='<div class="empty">✅ 이상 없음 — 전 회원 '+act.length+'명 점검 완료</div>';toast('전수 점검 완료 — 이상 없음');return;}
  el.innerHTML='<div style="font-weight:800;margin-bottom:4px">점검 '+act.length+'명 · 확인 필요 '+issues.length+'건</div>'
    +issues.map(x=>'<div style="padding:5px 0;border-bottom:1px solid #f1f3fa;font-size:14px"><span class="badge '+(x.t==='중복 의심'||x.t==='중복 회원'?'b-warn':x.t==='모순 의심'?'b-bad':'b-gray')+'">'+x.t+'</span> <b>'+esc(x.n)+'</b><div class="muted" style="font-size:13px">'+esc(x.d)+'</div></div>').join('');
  toast('점검 완료 — '+issues.length+'건 확인 필요');
}

function isLongRest(m){
  if(m.memberType!=='휴회회원')return false;
  if(!m.restEnd)return true;
  return m.restEnd>=addMonths(m.restDate||todayStr(),3);
}
// 휴회 6개월 경과 → 자동 퇴회 / 단기휴회 종료일 경과 → 자동 복귀
function autoRetire(){
  const today=todayStr();let n=0;
  db.members=db.members.filter(m=>{
    if(m.memberType==='휴회회원'&&m.restDate){
      const end=addMonths(m.restDate,6);
      if(today>end){db.retired.push({...m,retiredAt:today});n++;return false;}
    }
    return true;
  });
  if(n>0){save();toast(n+'명이 휴회 6개월 경과로 퇴회 처리되었습니다');}
  let r=0;
  db.members.forEach(m=>{
    if(m.memberType==='휴회회원'&&!isLongRest(m)&&m.restEnd&&todayStr()>m.restEnd){
      if(m.feePayDate)m.feePayDate=restShift(m,m.feePayDate);
      if(m.groupPayDate)m.groupPayDate=restShift(m,m.groupPayDate);
      pushRestHist(m);
      m.memberType='일반회원';m.restDate=null;m.restEnd=null;r++;
    }
  });
  if(r>0){save();toast(r+'명이 휴회 기간 종료로 자동 복귀되었습니다');}
}

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  const b=document.getElementById('pwaInstallBtn');if(b)b.style.display='';
});
function pwaInstall(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;
    const b=document.getElementById('pwaInstallBtn');if(b)b.style.display='none';});
}
window.addEventListener('appinstalled',()=>{const b=document.getElementById('pwaInstallBtn');if(b)b.style.display='none';});
(function(){
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
  const standalone=(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||window.navigator.standalone;
  if(isIOS&&!standalone){const g=document.getElementById('iosGuide');if(g)g.style.display='';}
})();
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword,sendPasswordResetEmail,signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { initializeFirestore,persistentLocalCache,doc,getDoc,setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig={
  apiKey:"AIzaSyBaSAZBrkbtqNBSYO8w2IYZami6iMAnEeY",
  authDomain:"studiomuse-app.firebaseapp.com",
  projectId:"studiomuse-app",
  storageBucket:"studiomuse-app.firebasestorage.app",
  messagingSenderId:"1098980343908",
  appId:"1:1098980343908:web:7b5d8b26f1bb5ffb925f71"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const fsdb=initializeFirestore(app,{localCache:persistentLocalCache()});
const msg=t=>{const el=document.getElementById('lockMsg');if(el)el.textContent=t;};
const email=()=>document.getElementById('authEmail').value.trim();
const pw=()=>document.getElementById('authPw').value;
function errKo(e){
  const c=(e&&e.code)||'';
  if(c.includes('invalid-email'))return '이메일 형식이 올바르지 않습니다';
  if(c.includes('missing-password')||c.includes('weak-password'))return '비밀번호는 6자 이상 입력하세요';
  if(c.includes('email-already-in-use'))return '이미 가입된 이메일입니다. 로그인해 주세요';
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found'))return '이메일 또는 비밀번호가 올바르지 않습니다';
  if(c.includes('too-many-requests'))return '시도가 너무 많습니다. 잠시 후 다시 시도하세요';
  if(c.includes('network'))return '인터넷 연결을 확인하세요';
  if(c.includes('api-key'))return '설정 오류: API 키를 확인해야 합니다';
  return '오류: '+c;
}
window.fbLogin=async()=>{try{msg('');await signInWithEmailAndPassword(auth,email(),pw());}catch(e){msg(errKo(e));}};
window.fbSignup=async()=>{try{msg('');await createUserWithEmailAndPassword(auth,email(),pw());}catch(e){msg(errKo(e));}};
window.fbReset=async()=>{try{if(!email())return msg('이메일을 먼저 입력하세요');await sendPasswordResetEmail(auth,email());msg('비밀번호 재설정 메일을 보냈습니다. 메일함을 확인하세요.');}catch(e){msg(errKo(e));}};
window.fbLogout=()=>{if(!confirm('로그아웃할까요?'))return;localStorage.removeItem('saxadmin_v1');signOut(auth).then(()=>location.reload());};
let saveTimer=null,uid=null;
window.queueCloudSave=(json)=>{
  if(!uid)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{setDoc(doc(fsdb,'users',uid),{payload:json,updated:Date.now()}).catch(e=>console.warn('저장 실패',e));},800);
};
onAuthStateChanged(auth,async user=>{
  const lock=document.getElementById('lockScreen');
  if(!user){uid=null;window.fbUserEmail='';lock.style.display='flex';return;}
  uid=user.uid;window.fbUserEmail=user.email||'';
  try{
    const snap=await getDoc(doc(fsdb,'users',uid));
    if(snap.exists()&&snap.data().payload){
      window.applyCloudDb(JSON.parse(snap.data().payload));
    }else{
      await setDoc(doc(fsdb,'users',uid),{payload:window.getDbJson(),updated:Date.now()});
    }
  }catch(e){console.warn('클라우드 불러오기 실패',e);}
  lock.style.display='none';
});
if('serviceWorker' in navigator && location.protocol==='https:'){navigator.serviceWorker.register('sw.js');}
</script>
</body>
