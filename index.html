<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>회원관리 studioMUSE</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#4338ca">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="회원관리">
<style>
:root{
  --bg:#f6f7fb; --card:#ffffff; --ink:#1f2937; --sub:#6b7280; --line:#eceef4;
  --brand:#6366f1; --brand-soft:#eef2ff; --ok:#10b981; --ok-soft:#ecfdf5;
  --warn:#f59e0b; --warn-soft:#fffbeb; --bad:#ef4444; --bad-soft:#fef2f2;
  --radius:18px; --grad:linear-gradient(135deg,#6366f1,#8b5cf6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px;padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;width:100%;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brand);outline-offset:-1px;border-color:var(--brand)}
label{font-size:13px;color:var(--sub);display:block;margin-bottom:4px;font-weight:600}

/* layout */
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:linear-gradient(180deg,#312e81 0%,#1e1b4b 100%);color:#cbd5e1;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.sidebar .logo{padding:20px 18px;font-weight:800;color:#fff;font-size:16px;border-bottom:1px solid rgba(255,255,255,.1);line-height:1.4}
.sidebar .logo small{display:block;font-weight:400;color:#64748b;font-size:11px;margin-top:2px}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:#c7d2fe;padding:13px 12px;border-radius:8px;font-size:24px;font-weight:600;margin-bottom:2px}
.nav button:hover{background:rgba(255,255,255,.09);color:#fff}
.nav button.active{background:var(--grad);color:#fff;font-weight:700;box-shadow:0 4px 12px rgba(99,102,241,.35)}
.nav .ico{width:30px;text-align:center;font-size:24px}
.sidebar .foot{padding:12px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:#a5b4fc}
.main{flex:1;min-width:0;padding:22px;padding-bottom:90px}
.pagehead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.pagehead h1{font-size:21px}
.pagehead .sub{color:var(--sub);font-size:13px;margin-top:3px}

/* mobile nav */
.mobiletop{display:none}
.tabbar{display:none}
@media(max-width:860px){
  .sidebar{display:none}
  .main{padding:10px;padding-bottom:128px}
  .mobiletop{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#4338ca,#6d28d9);color:#fff;padding:10px 12px;font-weight:800;position:sticky;top:0;z-index:40;flex-wrap:wrap;gap:6px}
  #brandMobile{font-size:26px}
  .mobiletop small{font-weight:400;color:#c7d2fe;font-size:12px}
  .mobiletop .btn.topnav{background:rgba(255,255,255,.16);border:none;color:#fff;font-size:19px;font-weight:700;padding:9px 14px;border-radius:14px;backdrop-filter:blur(4px)}
  .tabbar{display:flex;position:fixed;bottom:10px;left:10px;right:10px;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border:none;border-radius:26px;box-shadow:0 8px 30px rgba(49,46,129,.22);z-index:40;padding:7px 5px calc(7px + env(safe-area-inset-bottom))}
  .tabbar button{flex:1;background:none;border:none;padding:8px 1px 9px;font-size:20px;font-weight:700;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:3px;white-space:nowrap;border-radius:18px;margin:0 2px}
  .tabbar button .ico{font-size:36px}
  .tabbar button.active{color:var(--brand);background:var(--brand-soft)}
  /* 큰 글씨 + 한 화면 배치 */
  body{font-size:20px}
  .card{padding:13px;margin-bottom:9px}
  .card h2{font-size:22px;margin-bottom:9px}
  .btn{font-size:19px;padding:11px 14px}
  .btn.sm{font-size:17px;padding:9px 12px}
  input,select,textarea{font-size:19px}
  label{font-size:17px}
  table{font-size:19px}
  th{font-size:16px}
  td{padding:12px 10px}
  .muted{font-size:17px}
  .badge{font-size:16px;padding:4px 11px}
  .detailgrid .item .k{font-size:17px}
  .detailgrid .item .v{font-size:24px}
  .copybox{font-size:19px}
  .lessonday .dh{font-size:20px;padding:10px 12px}
  .lessonday .li{font-size:19px;padding:11px 12px}
  .pagehead{margin-bottom:8px}
  .pagehead h1{font-size:26px}
  .pagehead .sub{font-size:16px}
  .grid{gap:8px}
  .empty{font-size:20px;padding:16px 8px}
  .card .row{font-size:19px}
}

/* components */
.card{background:var(--card);border:none;border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(17,24,39,.05),0 6px 20px rgba(17,24,39,.05)}
.card h2{font-size:15px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.grid{display:grid;gap:12px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:860px){.g4,.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.formgrid.g2{grid-template-columns:1fr}}
.stat{background:var(--card);border:none;border-radius:var(--radius);padding:14px 16px;cursor:pointer;box-shadow:0 1px 2px rgba(17,24,39,.05),0 6px 20px rgba(17,24,39,.05)}
.stat .n{font-size:26px;font-weight:800;margin-top:4px}
.stat .t{font-size:12.5px;color:var(--sub);font-weight:600}
.stat.bad .n{color:var(--bad)} .stat.ok .n{color:var(--ok)} .stat.brand .n{color:var(--brand)} .stat.warn .n{color:var(--warn)}

.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:12px;font-size:13.5px;font-weight:600;transition:.15s}
.btn:hover{background:#f8fafc}
.btn.primary{background:var(--grad);border:none;color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.btn.primary:hover{filter:brightness(1.06)}
.btn.danger{color:var(--bad);border-color:#fecaca}
.btn.sm{padding:5px 10px;font-size:12.5px}
.btn.ghost{border:none;background:none;color:var(--brand)}

.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:700;white-space:nowrap}
.b-ok{background:var(--ok-soft);color:var(--ok)}
.b-warn{background:var(--warn-soft);color:var(--warn)}
.b-bad{background:var(--bad-soft);color:var(--bad)}
.b-gray{background:#f1f5f9;color:var(--sub)}
.b-brand{background:var(--brand-soft);color:var(--brand)}

table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;color:var(--sub);font-size:12px;font-weight:700;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr.click{cursor:pointer}
tr.click:hover td{background:#f8fafc}
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

.formgrid{display:grid;gap:14px}
.field.full{grid-column:1/-1}
.checks{display:flex;gap:6px;flex-wrap:wrap}
.checks label.day{display:inline-flex;align-items:center;justify-content:center;width:40px;height:36px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;color:var(--ink);cursor:pointer;margin:0;font-weight:600}
.checks input{display:none}
.checks input:checked+span{color:#fff}
.checks label.day:has(input:checked){background:var(--grad);border-color:transparent;color:#fff}
.switch{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink);font-weight:600;cursor:pointer}
.switch input{width:18px;height:18px}

.empty{text-align:center;color:var(--sub);padding:28px 10px;font-size:13.5px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.mt{margin-top:12px}
.muted{color:var(--sub);font-size:12.5px}
.big{font-size:17px;font-weight:700}
.copybox{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:13.5px;white-space:pre-wrap;line-height:1.6}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#312e81;color:#fff;padding:10px 20px;border-radius:99px;font-size:13.5px;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.detailgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.detailgrid .item{background:#f6f7fd;border-radius:14px;padding:10px 12px}
.detailgrid .item .k{font-size:11px;color:var(--sub);font-weight:700}
.detailgrid .item .v{font-size:14px;font-weight:600;margin-top:2px}
.progress{height:8px;background:#e2e8f0;border-radius:99px;overflow:hidden}
.progress i{display:block;height:100%;background:var(--grad);border-radius:99px}
.lessonday{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.lessonday .dh{background:#f1f5f9;padding:8px 12px;font-weight:800;font-size:13.5px}
.lessonday .dh.today{background:var(--grad);color:#fff}
.lessonday .li{padding:9px 12px;border-top:1px solid #f1f5f9;font-size:13.5px;cursor:pointer}
.lessonday .li:hover{background:#f8fafc}
.weekgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
@media(max-width:860px){.weekgrid{grid-template-columns:1fr}}
.searchbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.searchbar input,.searchbar select{width:auto;flex:1;min-width:120px}
@media(max-width:640px){
  table.members th:nth-child(4),table.members td:nth-child(4),
  table.members th:nth-child(5),table.members td:nth-child(5){display:none}
}
</style>
</head>
<body>
<div id="lockScreen" style="position:fixed;inset:0;background:linear-gradient(160deg,#312e81 0%,#1e1b4b 60%,#0f0d2e 100%);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px">
  <div style="font-size:40px" id="lockIcon">🎷</div>
  <div style="color:#fff;font-weight:800;font-size:18px" id="lockTitle">회원관리</div>
  <div style="color:#94a3b8;font-size:13px;text-align:center" id="lockHint">이메일로 로그인하세요</div>
  <input type="email" id="authEmail" placeholder="이메일" autocomplete="username" style="max-width:270px;padding:12px">
  <input type="password" id="authPw" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" style="max-width:270px;padding:12px" onkeydown="if(event.key==='Enter')fbLogin()">
  <button class="btn primary" style="width:270px;justify-content:center;padding:12px" onclick="fbLogin()">로그인</button>
  <button class="btn" style="width:270px;justify-content:center" onclick="fbSignup()">처음이신가요? 회원가입</button>
  <a href="#" style="color:#64748b;font-size:12px" onclick="fbReset();return false">비밀번호를 잊으셨나요?</a>
  <div id="lockMsg" style="color:#f87171;font-size:13px;min-height:18px;text-align:center"></div>
  <div style="color:#475569;font-size:11.5px;text-align:center;max-width:300px">☁️ 데이터는 본인 계정의 클라우드에 안전하게 저장되어<br>폰을 바꿔도 로그인하면 그대로 유지됩니다</div>
</div>
<div class="mobiletop"><div id="brandMobile">🎷 회원관리</div><div class="row" style="gap:6px">
  <button class="btn topnav" onclick="go('dashboard')">🏠 홈</button>
  <button class="btn topnav" onclick="go('register')">➕ 회원등록</button>
  <button class="btn topnav" onclick="go('members')">👥 목록</button>
  <button class="btn topnav" onclick="go('settings')">⚙️</button></div></div>
<div class="app">
  <aside class="sidebar">
    <div class="logo" id="brandSide">🎷 회원관리</div>
    <nav class="nav" id="sidenav"></nav>
    <div class="foot" id="sideFoot"></div>
  </aside>
  <main class="main" id="main"></main>
</div>
<nav class="tabbar" id="tabbar"></nav>
<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none">

<script>
/* ================= 데이터 ================= */
const DBKEY='saxadmin_v1';
const DAYS=['월','화','수','목','금','토','일'];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

const DEFAULT_TEMPLATES=[
 {id:'t1',name:'연습실 이용기간 만료 안내',body:'안녕하세요. 항상 "{단체명}"을 이용해 주셔서 진심으로 감사드립니다.\n\n회원님께서 등록하신 연습실 이용기간({이용기간})이 만료되었음을 알려 드립니다.\n\n연습하시면서 불편한 점이나 개선이 필요한 부분이 있으시면 언제든 말씀 부탁드립니다.\n더 좋은 환경으로 보답하겠습니다.\n\n감사합니다.'},
 {id:'t2',name:'회비 납부 예정 안내',body:'[{단체}] {이름}님, 안녕하세요. 🎷\n이번 달 회비({회비}원) 납부 예정일은 {예정일}입니다.\n미리 안내드립니다. 감사합니다!'},
 {id:'t3',name:'레슨 재등록 안내',body:'[{단체}] {이름}님, 안녕하세요. 🎷\n등록하신 레슨 {총횟수}회가 모두 진행되었습니다.\n계속 수강을 원하시면 레슨비 {레슨비}원 결제 부탁드립니다.\n감사합니다!'},
 {id:'t4',name:'레슨 등록기간 만료 안내',body:'안녕하세요. 항상 "{단체명}"을 이용해 주셔서 진심으로 감사드립니다.\n\n회원님께서 등록하신 레슨 기간({레슨기간})이 만료되었음을 알려 드립니다.\n\n계속 수강을 원하시면 레슨비 납부 부탁드립니다.\n레슨을 받으시면서 불편한 점이나 개선이 필요한 부분이 있으시면 언제든 말씀 부탁드립니다.\n더 좋은 레슨으로 보답하겠습니다.\n\n감사합니다.'},
 {id:'t5',name:'레슨 일정 변경 공지',body:'{이름}님, 안녕하세요. {상호}입니다.\n\n레슨 일정이 변경되어 안내드립니다.\n\n▶ 변경 내용: (문구 수정 버튼을 눌러 내용을 입력하세요)\n\n확인 부탁드립니다. 감사합니다.'},
 {id:'t6',name:'행사 공지 (전체)',body:'안녕하세요, {상호}입니다.\n\n▶ 행사 안내: (문구 수정 버튼을 눌러 내용을 입력하세요)\n\n많은 참여 부탁드립니다. 감사합니다.'}
];

function load(){
  try{const d=JSON.parse(localStorage.getItem(DBKEY));if(d&&d.members)return d;}catch(e){}
  return {groups:[],members:[],payLogs:[],lessonLogs:[],templates:JSON.parse(JSON.stringify(DEFAULT_TEMPLATES)),sentLogs:[]};
}
let db=load();
function migrateDb(){
// 기본 템플릿 누락분 보충 (업데이트 대응)
DEFAULT_TEMPLATES.forEach(t=>{if(!db.templates.find(x=>x.id===t.id))db.templates.push(JSON.parse(JSON.stringify(t)));});
// 설정 기본값
db.settings=Object.assign({studioName:'studio MUSE',icon:'🎷',feeLabel:'회비',lessonTotal:4,ownerName:'studio MUSE',ownerContact:'',pin:'',lastBackup:''},db.settings||{});
// 금전출납부 기본값
db.ledger=db.ledger||[];
db.cats=db.cats||{income:['행사참가비','후원금','기타 수입'],expense:['임대료','전기요금','통신요금','강사료','수리비','기타 지출']};
}
migrateDb();
const S=()=>db.settings, FL=()=>db.settings.feeLabel||'회비';

/* ================= 접속(로그인) 화면 ================= */
function initLock(){
  document.getElementById('lockIcon').textContent=S().icon;
  document.getElementById('lockTitle').textContent='회원관리 · '+S().studioName;
}
function unlock(){}
function save(){const j=JSON.stringify(db);localStorage.setItem(DBKEY,j);if(window.queueCloudSave)window.queueCloudSave(j);}

/* ================= 날짜 유틸 ================= */
const pad=n=>String(n).padStart(2,'0');
const iso=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const todayStr=()=>iso(new Date());
function addMonths(ds,n){
  const d=new Date(ds+'T00:00:00');const day=d.getDate();
  d.setMonth(d.getMonth()+n);
  if(d.getDate()<day)d.setDate(0); // 말일 보정 (1/31 +1개월 → 2/28)
  return iso(d);
}
function daysBetween(a,b){ // b - a (일수)
  return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);
}
const fmtDate=ds=>ds?ds.replace(/-/g,'.'):'-';
const fmtKor=ds=>{if(!ds)return '-';const d=new Date(ds+'T00:00:00');return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';};
function addDays(ds,n){const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return iso(d);}
const fmtWon=n=>(n||0).toLocaleString('ko-KR');

/* ================= 상태 계산 ================= */
// 회비: 납부일 +1개월 = 다음 예정일. 예정일 경과 시 '경과', 예정일+3일 초과 시 '미납(알림 대상)'
function feeStatus(m){
  if(m.manageFee===false)return{code:'nofee',label:'레슨비만',due:null,over:0};
  if(!m.feePayDate)return{code:'none',label:'납부기록 없음',due:null,over:0};
  const due=addMonths(m.feePayDate,m.feeCycle||1);
  const over=daysBetween(due,todayStr());
  if(over<=0)return{code:'ok',label:'정상',due,over};
  if(over<=3)return{code:'grace',label:'예정일 경과',due,over};
  return{code:'overdue',label:'미납',due,over};
}
function lessonStatus(m){
  if(!m.hasLesson)return null;
  const total=m.lessonTotal||4, done=m.lessonDone||0;
  return{total,done,finished:done>=total};
}
// 레슨 회차별 예정 날짜: 납부일(시작일)부터 등록 요일에 총횟수만큼. 휴강일은 건너뛰어 자동 연장
function lessonSessionDates(m){
  if(!m.lessonPayDate||!(m.lessonDays||[]).length)return[];
  const skips=new Set((m.lessonSkips||[]).map(s=>s.date));
  const total=m.lessonTotal||4, dates=[];
  let d=new Date(m.lessonPayDate+'T00:00:00'), guard=0;
  while(dates.length<total&&guard<370){
    const ds=iso(d);
    if(m.lessonDays.includes(DAYS[(d.getDay()+6)%7])&&!skips.has(ds))dates.push(ds);
    d.setDate(d.getDate()+1);guard++;
  }
  return dates;
}
// 레슨비: 시작일(납부일)부터 총횟수(기본 4회) 진행 시 만료
function lessonFeeStatus(m){
  if(!m.hasLesson)return null;
  const total=m.lessonTotal||4, done=m.lessonDone||0;
  if(!m.lessonPayDate)return{code:'none',label:'납부기록 없음',due:null,over:0,total,done};
  const dates=lessonSessionDates(m);
  const due=dates.length?dates[dates.length-1]:addMonths(m.lessonPayDate,1); // 마지막 회차 예정일 = 만료 예정일
  if(done>=total)return{code:'overdue',label:total+'회 만료',due,over:0,total,done};
  const over=daysBetween(due,todayStr());
  if(over>3)return{code:'grace',label:'만료 예정일 경과',due,over,total,done};
  return{code:'ok',label:'진행중',due,over:0,total,done};
}
function lbadge(st){
  if(!st)return'';
  if(st.code==='ok')return '<span class="badge b-ok">진행중 '+st.done+'/'+st.total+'회</span>';
  if(st.code==='grace')return '<span class="badge b-warn">만료 예정일 경과</span>';
  if(st.code==='overdue')return '<span class="badge b-bad">'+st.total+'회 만료 · 재등록</span>';
  return '<span class="badge b-gray">기록 없음</span>';
}
function groupName(id){const g=db.groups.find(g=>g.id===id);return g?g.name:'(미지정)';}
function badge(st){
  if(st.code==='ok')return '<span class="badge b-ok">정상</span>';
  if(st.code==='grace')return '<span class="badge b-warn">예정일 경과 '+st.over+'일</span>';
  if(st.code==='overdue')return '<span class="badge b-bad">미납 '+st.over+'일</span>';
  if(st.code==='nofee')return '<span class="badge b-gray">레슨비만</span>';
  return '<span class="badge b-gray">기록 없음</span>';
}

let toastTimer;

function copyText(text,msg){
  navigator.clipboard?.writeText(text).then(()=>toast(msg||'복사되었습니다')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast(msg||'복사되었습니다');

}

/* ---- 일괄 등록 ---- */
async function pickContacts(){
  if(!('contacts' in navigator&&navigator.contacts.select))
    return toast('이 브라우저는 연락처 선택을 지원하지 않습니다. 붙여넣기를 이용하세요.');
  try{
    const cs=await navigator.contacts.select(['name','tel'],{multiple:true});
    if(!cs.length)return;
    const ta=document.getElementById('bulkText');
    const lines=cs.map(c=>((c.name&&c.name[0])||'이름없음')+' '+((c.tel&&c.tel[0])||'')).join('\n');
    ta.value=(ta.value.trim()?ta.value.trim()+'\n':'')+lines;
    toast(cs.length+'명을 가져왔습니다');
  }catch(e){/* 사용자가 취소 */}
}
function parseBulk(text){
  const out=[];
  text.split(/\n+/).forEach(line=>{
    line=line.trim();if(!line)return;
    const parts=line.split(/[\t,]+|\s+/).filter(Boolean);
    let phone='';const names=[];
    parts.forEach(p=>{const d=p.replace(/[^0-9]/g,'');
      if(d.length>=9&&!phone)phone=p;else names.push(p);});
    const name=names.join(' ').trim();
    if(name)out.push({name,phone});
  });
  return out;
}
function bulkRegister(){
  const rows=parseBulk(document.getElementById('bulkText').value);
  if(!rows.length)return toast('등록할 내용이 없습니다. 한 줄에 한 명씩 입력하세요.');
  const gid=document.getElementById('bulkGroup').value||null;
  // 중복 확인: 전화번호(또는 번호 없으면 이름) 기준
  const existPhones=new Set(db.members.map(m=>(m.phone||'').replace(/[^0-9]/g,'')).filter(Boolean));
  const existNames=new Set(db.members.map(m=>m.name));
  const fresh=[],dup=[];
  rows.forEach(r=>{
    const pd=(r.phone||'').replace(/[^0-9]/g,'');
    if((pd&&existPhones.has(pd))||(!pd&&existNames.has(r.name)))dup.push(r);else fresh.push(r);
  });
  if(!fresh.length)return toast('모두 이미 등록된 회원입니다');
  const preview=fresh.slice(0,10).map(r=>r.name+' '+(r.phone||'')).join('\n')+(fresh.length>10?'\n… 외 '+(fresh.length-10)+'명':'');
  if(!confirm(fresh.length+'명을 등록할까요?'+(dup.length?' (중복 '+dup.length+'명 제외)':'')+'\n\n'+preview))return;
  fresh.forEach(r=>db.members.push({id:uid(),groupId:gid,name:r.name,regDate:todayStr(),
    birth:'',gender:'',locker:'',phone:r.phone,manageFee:true,fee:0,feeCycle:1,feePayDate:'',
    hasLesson:false,lessonDays:[],lessonTime:'',lessonFee:0,lessonPayDate:'',
    lessonTotal:S().lessonTotal||4,lessonDone:0}));
  save();toast(fresh.length+'명 등록 완료! 회원을 눌러 세부사항을 입력하세요');go('members');
}

  el.textContent=inp.value?'다음 납부 예정일: '+fmtDate(addMonths(inp.value,cy))+' ('+cy+'개월)':'납부일 입력 시 다음 예정일 자동 계산';

function saveMember(e,editId){
  e.preventDefault();
  const f=new FormData(e.target);
  const data={
    name:f.get('name').trim(), groupId:f.get('groupId')||null,
    regDate:f.get('regDate')||todayStr(), birth:f.get('birth')||'', gender:f.get('gender')||'',
    locker:f.get('locker').trim(), phone:f.get('phone').trim(),
    manageFee:!!f.get('manageFee'),
    fee:Number(f.get('fee'))||0, feeCycle:Number(f.get('feeCycle'))||1, feePayDate:f.get('feePayDate')||'',
    hasLesson:!!f.get('hasLesson'),
    lessonDays:f.getAll('lessonDays'), lessonTime:f.get('lessonTime')||'',
    lessonFee:Number(f.get('lessonFee'))||0, lessonPayDate:f.get('lessonPayDate')||'',
    lessonTotal:Number(f.get('lessonTotal'))||4, lessonDone:Number(f.get('lessonDone'))||0
  };
  if(editId){
    const m=db.members.find(x=>x.id===editId);Object.assign(m,data);
    save();toast('수정되었습니다');go('detail',editId);
  }else{
    const m={id:uid(),...data};db.members.push(m);
    if(m.feePayDate)db.payLogs.push({id:uid(),memberId:m.id,date:m.feePayDate,amount:m.fee,type:'fee',memo:'등록 시 입력'});
    if(m.hasLesson&&m.lessonPayDate)db.payLogs.push({id:uid(),memberId:m.id,date:m.lessonPayDate,amount:m.lessonFee,type:'lesson',memo:'등록 시 입력'});
    save();toast('회원이 등록되었습니다');go('detail',m.id);
  }
}

function monthlyStats(){
  const out=[];const t=new Date();
  for(let i=5;i>=0;i--){
    const d=new Date(t.getFullYear(),t.getMonth()-i,1);
    const ym=d.getFullYear()+'-'+pad(d.getMonth()+1);
    const logs=db.payLogs.filter(p=>p.date.startsWith(ym));
    out.push({ym:ym.replace('-','.'),
      fee:logs.filter(p=>p.type!=='lesson').reduce((s,p)=>s+(p.amount||0),0),
      lesson:logs.filter(p=>p.type==='lesson').reduce((s,p)=>s+(p.amount||0),0)});
  }
  return out;
}

function weekDates(off){ // 해당 주 월~일 날짜(iso)
  const t=new Date();t.setDate(t.getDate()-((t.getDay()+6)%7)+off*7);
  return DAYS.map((_,i)=>{const d=new Date(t);d.setDate(t.getDate()+i);return iso(d);});
}

let notifyTplId=null;
function fillTemplate(body,m){
  const st=feeStatus(m);
  const lst=lessonFeeStatus(m);
  // 이용기간: 회비 납부일 ~ 다음 예정일 하루 전 (예: 6월 3일 납부 → 6월 3일 ~ 7월 2일)
  const start=m.feePayDate||'', end=st.due?addDays(st.due,-1):'';
  const period=start&&end?fmtDate(start)+' ~ '+fmtDate(end):'-'; // 예: 2026.01.01 ~ 2026.01.31
  // 레슨기간: 레슨비 납부일(시작일) ~ 마지막 회차(총횟수) 예정일
  const lStart=m.lessonPayDate||'', lEnd=lst&&lst.due?lst.due:'';
  const lPeriod=lStart&&lEnd?fmtDate(lStart)+' ~ '+fmtDate(lEnd):'-';
  return body
    .replaceAll('{이름}',m.name)
    .replaceAll('{단체명}',groupName(m.groupId)).replaceAll('{단체}',groupName(m.groupId))
    .replaceAll('{상호}',S().studioName)
    .replaceAll('{이용기간}',period)
    .replaceAll('{시작일}',fmtDate(start)).replaceAll('{만료일}',fmtDate(end))
    .replaceAll('{레슨기간}',lPeriod)
    .replaceAll('{레슨시작일}',fmtDate(lStart)).replaceAll('{레슨만료일}',fmtDate(lEnd))
    .replaceAll('{예정일}',st.due?fmtDate(st.due):'-')
    .replaceAll('{레슨예정일}',lst&&lst.due?fmtDate(lst.due):'-')
    .replaceAll('{회비}',fmtWon(m.fee)).replaceAll('{레슨비}',fmtWon(m.lessonFee))
    .replaceAll('{총횟수}',String(m.lessonTotal||4)).replaceAll('{전화번호}',m.phone||'');
}
function getTargets(tpl){
  if(!tpl)return{list:[],label:'대상'};

  if(tpl.id==='t4')return{list:db.members.filter(m=>{const s=lessonFeeStatus(m);return s&&s.code==='overdue';}),label:'레슨 등록기간 만료 대상 (미납)'};
  if(tpl.id==='t5')return{list:db.members.filter(m=>m.hasLesson),label:'레슨 회원 전체'};
  if(tpl.id==='t6')return{list:db.members.slice(),label:'전체 회원'};

/* ================= 금전출납부 ================= */
let ledgerYear=todayStr().slice(0,4), ledgerMonth='';
// 해당 연도 전체 항목: 회비·레슨비 납부(자동) + 직접 입력 내역
function ledgerEntries(year){
  const es=[];
  db.payLogs.forEach(p=>{if(p.date.startsWith(year)){
    const m=db.members.find(x=>x.id===p.memberId);
    es.push({id:'auto_'+p.id,date:p.date,kind:'in',category:p.type==='lesson'?'레슨비':FL(),amount:p.amount||0,memo:m?m.name:'(삭제된 회원)',auto:true});}});
  db.ledger.forEach(l=>{if(l.date.startsWith(year))es.push(l);});
  return es.sort((a,b)=>b.date.localeCompare(a.date)||String(b.id).localeCompare(String(a.id)));
}
function vLedger(){
  const years=[...new Set([todayStr().slice(0,4),...db.payLogs.map(p=>p.date.slice(0,4)),...db.ledger.map(l=>l.date.slice(0,4))])].sort().reverse();
  const es=ledgerEntries(ledgerYear);
  const monthly=[];let cum=0;
  for(let i=1;i<=12;i++){
    const mm=ledgerYear+'-'+pad(i);
    const list=es.filter(e=>e.date.startsWith(mm));
    const inc=list.filter(e=>e.kind==='in').reduce((s,e)=>s+e.amount,0);
    const out=list.filter(e=>e.kind==='out').reduce((s,e)=>s+e.amount,0);
    cum+=inc-out;
    monthly.push({m:i,inc,out,bal:inc-out,cum});
  }
  const totIn=monthly.reduce((s,x)=>s+x.inc,0), totOut=monthly.reduce((s,x)=>s+x.out,0);
  const shown=ledgerMonth?es.filter(e=>e.date.slice(5,7)===ledgerMonth):es;
  const isJan=todayStr().slice(5,7)==='01';

function addLedger(){
  const date=document.getElementById('lgDate').value;
  const kind=document.getElementById('lgKind').value;
  const category=document.getElementById(kind==='in'?'lgCatIn':'lgCatOut').value;
  const amount=Number(document.getElementById('lgAmount').value);
  const memo=document.getElementById('lgMemo').value.trim();
  if(!date)return toast('날짜를 선택하세요');
  if(!amount||amount<=0)return toast('금액을 입력하세요');
  db.ledger.push({id:uid(),date,kind,category,amount,memo});
  ledgerYear=date.slice(0,4);
  save();render();toast((kind==='in'?'수입':'지출')+' '+fmtWon(amount)+'원 기록됨');
}
function delLedger(id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  db.ledger=db.ledger.filter(l=>l.id!==id);save();render();
}
function addCat(kind){
  const name=prompt(kind==='income'?'새 수입 항목 이름':'새 지출 항목 이름');
  if(!name||!name.trim())return;
  const list=kind==='income'?db.cats.income:db.cats.expense;
  if(list.includes(name.trim()))return toast('이미 있는 항목입니다');
  list.push(name.trim());save();render();
}
function delCat(kind,name){
  if(!confirm(`'${name}' 항목을 삭제할까요? (기존 기록은 유지됩니다)`))return;
  if(kind==='income')db.cats.income=db.cats.income.filter(c=>c!==name);
  else db.cats.expense=db.cats.expense.filter(c=>c!==name);
  save();render();
}
function exportLedgerCSV(){
  const es=ledgerEntries(ledgerYear).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const rows=[['날짜','구분','항목','금액','메모']];
  es.forEach(e=>rows.push([e.date,e.kind==='in'?'수입':'지출',e.category,e.amount,e.memo||'']));
  const csv='﻿'+rows.map(r=>r.map(c=>'"'+String(c??'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='금전출납부_'+ledgerYear+'.csv';a.click();
  toast(ledgerYear+'년 출납부 CSV가 다운로드됩니다');
}

document.getElementById('importFile').addEventListener('change',function(){

  r.onload=()=>{try{

    if(!d.members)throw 0;
    if(!confirm('현재 데이터를 백업 파일로 교체할까요?'))return;
    db=d;save();render();toast('복원되었습니다');
  }catch(e){toast('올바른 백업 파일이 아닙니다');}};
  r.readAsText(f);this.value='';
});

  try{
    const snap=await getDoc(doc(fsdb,'users',uid));
    if(snap.exists()&&snap.data().payload){
      window.applyCloudDb(JSON.parse(snap.data().payload));
    }else{
      await setDoc(doc(fsdb,'users',uid),{payload:window.getDbJson(),updated:Date.now()});
    }
  }catch(e){console.warn('클라우드 불러오기 실패',e);}
  lock.style.display='none';
});
if('serviceWorker' in navigator && location.protocol==='https:'){navigator.serviceWorker.register('sw.js');}
</script>
